<html lang="en">

  <title>Wedigtech — AI Business OS</title>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --purple: #6337AB;
      --purple-l: rgba(99, 55, 171, .08);
      --purple-m: rgba(99, 55, 171, .14);
      --pink: #B621AB;
      --black: #0A0A0B;
      --bg: #F6F5F1;
      --surface: #FFFFFF;
      --border: #E8E7E2;
      --border-s: #D2D0C8;
      --text: #141412;
      --t2: #4B4945;
      --t3: #8A8880;
      --t4: #B8B6B0;
      --green: #16A34A;
      --green-bg: rgba(22, 163, 74, .08);
      --red: #DC2626;
      --amber: #D97706;
      --blue: #0EA5E9;
      --heading: 'Plus Jakarta Sans', system-ui, sans-serif;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --sb-w: 240px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body,
    #root {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased
    }

    button,
    input,
    textarea,
    select {
      font-family: inherit
    }

    ::selection {
      background: rgba(99, 55, 171, .18)
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-s);
      border-radius: 2px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--t4)
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%)
      }

      to {
        transform: translateX(0)
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes toastIn {
      from {
        transform: translateY(10px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .3;
        transform: scale(.6)
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -400% 0
      }

      100% {
        background-position: 400% 0
      }
    }

    @keyframes scaleIn {
      from {
        transform: scale(.96);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes breathe {

      0%,
      100% {
        opacity: .65;
        transform: scale(1)
      }

      50% {
        opacity: 1;
        transform: scale(1.1)
      }
    }

    @keyframes countUp {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes obStep {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .fu {
      animation: fadeUp .3s ease both
    }

    .fu1 {
      animation: fadeUp .3s .05s ease both
    }

    .fu2 {
      animation: fadeUp .3s .10s ease both
    }

    .fu3 {
      animation: fadeUp .3s .15s ease both
    }

    .fu4 {
      animation: fadeUp .3s .20s ease both
    }

    .fu5 {
      animation: fadeUp .3s .25s ease both
    }

    /* sidebar resize handle */
    .sb-resize {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 10;
      transition: background .15s
    }

    .sb-resize:hover,
    .sb-resize.dragging {
      background: var(--purple)
    }

    /* cmd palette */
    .cmd-item {
      transition: background .1s
    }

    .cmd-item.sel {
      background: var(--purple-l);
      border-left: 2px solid var(--purple)
    }

    /* wf node */
    .wf-node {
      transition: all .2s;
      cursor: pointer
    }

    .wf-node:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 55, 171, .14)
    }

    /* ob option hover handled inline */
  </style>
</head>

        setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3800);

      return { toasts, show, dismiss };

      return [val, set];

    /* ─── PROMPT BAR (wireframe reference style) ──── */
    /* ─── AI SEARCH BOX ─────────────────────────── */
    /* Suggestions drawn from all 3 content types */
    const ALL_SUGGESTIONS = [
      // Playbooks
      ...PLAYBOOKS.map(p => ({ type: 'playbook', icon: 'bookOpen', col: '#6337AB', label: p.title + ' Playbook', sub: p.outcome + ' · ' + (p.steps || p.phases) + ' steps', tab: 'playbooks', id: p.id, data: p })),
      // Toolkits
      ...TOOLKITS.map(t => ({ type: 'toolkit', icon: 'toolbox', col: '#D97706', label: t.title, sub: t.assets + ' assets · ' + t.desc.slice(0, 40) + '…', tab: 'toolkits', id: t.id, data: t })),
      // Agents
      ...AGENTS.map(a => ({ type: 'agent', icon: 'robot', col: '#0A0A0B', label: a.name, sub: a.roi + ' · ' + a.time, tab: 'agents', id: a.id, data: a })),
    ];
    const TYPE_LABELS = { playbook: 'Playbook', toolkit: 'Toolkit', agent: 'AI Agent' };
    const TYPE_COLORS = { playbook: '#6337AB', toolkit: '#D97706', agent: '#0A0A0B' };

    function AISearchBox({ onTab, toast, onDeepLink }) {
      const [val, setVal] = useState('');
      const [focused, setFocused] = useState(false);
      const [sel, setSel] = useState(-1);
      const [dropPos, setDropPos] = useState({ top: 0, left: 0, width: 0 });
      const ref = useRef();
      const wrapRef = useRef();

      const filtered = useMemo(() => {
        if (!val.trim()) return [];
        const q = val.toLowerCase();
        return ALL_SUGGESTIONS.filter(s =>
          s.label.toLowerCase().includes(q) ||
          s.sub.toLowerCase().includes(q) ||
          s.type.includes(q)
        ).slice(0, 10);
      }, [val]);

      const quickSuggestions = [
        { icon: 'bookOpen', col: '#6337AB', label: 'MVP Builder Playbook', sub: 'Launch-ready MVP · 6 steps', tab: 'playbooks', type: 'playbook' },
        { icon: 'robot', col: '#0A0A0B', label: 'Get 1,000 Qualified Leads', sub: 'Lead Gen Agent · 10 min · 4 credits', tab: 'agents', type: 'agent' },
        { icon: 'toolbox', col: '#D97706', label: 'MVP Builder Toolkit', sub: '7 assets · Feature Matrix, PRD Pack, Launch Checklist', tab: 'toolkits', type: 'toolkit' },
        { icon: 'bookOpen', col: '#6337AB', label: 'GTM Strategy Playbook', sub: 'Complete go-to-market plan · 4 steps', tab: 'playbooks', type: 'playbook' },
        { icon: 'robot', col: '#0A0A0B', label: 'Turn 1 Video Into 30 Pieces', sub: 'Content Agent · 8 min · 2 credits', tab: 'agents', type: 'agent' },
        { icon: 'bookOpen', col: '#6337AB', label: 'First 100 Customers', sub: 'Structured growth path · 5 steps', tab: 'playbooks', type: 'playbook' },
        { icon: 'toolbox', col: '#D97706', label: 'Lead Gen Swipe File', sub: '15 assets · Cold email, LinkedIn scripts', tab: 'toolkits', type: 'toolkit' },
        { icon: 'bookOpen', col: '#6337AB', label: 'Fundraising Playbook', sub: 'Pre-seed to Series A · 6 steps', tab: 'playbooks', type: 'playbook' },
      ];

      const showDrop = focused && (val.trim() ? filtered.length > 0 : true);
      const displayList = val.trim() ? filtered : quickSuggestions;

      /* Calculate fixed dropdown position from wrapper */
      const updateDropPos = useCallback(() => {
        if (!wrapRef.current) return;
        const r = wrapRef.current.getBoundingClientRect();
        setDropPos({ top: r.bottom + 6, left: r.left, width: r.width });
      }, []);

      useEffect(() => {
        if (focused) updateDropPos();
      }, [focused, updateDropPos]);

      useEffect(() => {
        const fn = e => {
          if (e.type === 'mousedown') {
            // Close if click is outside both input wrapper and dropdown
            const drop = document.getElementById('search-drop');
            if (wrapRef.current && !wrapRef.current.contains(e.target) && drop && !drop.contains(e.target)) {
              setFocused(false); setSel(-1);
            }
          }
          if (e.key === 'ArrowDown' && focused) { e.preventDefault(); setSel(s => Math.min(s + 1, displayList.length - 1)); }
          if (e.key === 'ArrowUp' && focused) { e.preventDefault(); setSel(s => Math.max(s - 1, -1)); }
          if (e.key === 'Escape') { setFocused(false); setSel(-1); }
          if (e.key === 'Enter' && focused && sel >= 0) { const item = displayList[sel]; if (item) { pickItem(item); } }
          if (e.key === 'Enter' && focused && sel < 0 && val.trim()) { pickItem(displayList[0] || { tab: 'playbooks', label: val, type: 'playbook' }); }
        };
        window.addEventListener('keydown', fn);
        window.addEventListener('mousedown', fn);
        return () => { window.removeEventListener('keydown', fn); window.removeEventListener('mousedown', fn); };
      }, [displayList, sel, onTab, focused, val]);

      const pickItem = item => {
        onTab(item.tab);
        setFocused(false); setVal(''); setSel(-1);
        // Deep-link into specific item if it has an id
        if (item.id && onDeepLink) {
          setTimeout(() => onDeepLink({ type: item.type, id: item.id }), 80);
        }
        toast(`Opening ${item.label}…`, null, 'success');
      };

      const groupedResults = useMemo(() => {
        if (!val.trim()) return null;
        const groups = {};
        filtered.forEach(item => {
          if (!groups[item.type]) groups[item.type] = [];
          groups[item.type].push(item);
        });
        return groups;
      }, [filtered, val]);

      return <>
        {/* Search wrapper — elevated z-index so it sits above page content */}
        <div ref={wrapRef} className="fu1" style={{ marginBottom: 0, position: 'relative', zIndex: focused ? 500 : 10, transition: 'z-index 0s' }}>
          {/* Gradient border on focus */}
          <div style={{
            borderRadius: 20, padding: '2.5px',
            background: focused ? `linear-gradient(135deg,${C.purple},${C.pink})` : `transparent`,
            boxShadow: focused
              ? `0 0 0 5px ${C.purple}14,0 12px 48px rgba(99,55,171,.18)`
              : '0 2px 16px rgba(0,0,0,.07)',
            transition: 'all .25s',
          }}>
            <div style={{ background: C.surface, borderRadius: 17.5, border: focused ? 'none' : `1.5px solid ${C.borderS}` }}>
              <div style={{ padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 16 }}>
                {/* Search icon */}
                <Icon name="magnifying" size={20} color={focused ? C.purple : C.t3} style={{ flexShrink: 0, transition: 'color .2s' }} />
                {/* Input — taller, bigger font */}
                <input ref={ref} value={val}
                  onChange={e => { setVal(e.target.value); setSel(-1); updateDropPos(); }}
                  placeholder="Search Playbooks, AI Agents, Toolkits…"
                  onFocus={() => { setFocused(true); updateDropPos(); }}
                  style={{ flex: 1, border: 'none', outline: 'none', fontFamily: C.sans, fontSize: 16, color: C.text, background: 'transparent', lineHeight: 1.5, height: 28 }} />
                {/* Clear button */}
                {val && <button onClick={() => { setVal(''); ref.current?.focus(); setSel(-1); }}
                  style={{ width: 26, height: 26, borderRadius: '50%', background: C.bg, border: `1px solid ${C.border}`, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'all .15s' }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = C.borderS}
                  onMouseLeave={e => e.currentTarget.style.borderColor = C.border}>
                  <Icon name="x" size={12} color={C.t3} />
                </button>}
                {/* Divider */}
                <div style={{ width: 1, height: 22, background: C.border, flexShrink: 0 }} />
                {/* Search button */}
                <button
                  style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '9px 20px', borderRadius: 11, background: C.black, border: 'none', cursor: 'pointer', color: '#fff', fontSize: 13, fontWeight: 700, fontFamily: C.heading, flexShrink: 0, transition: 'all .18s', boxShadow: '0 2px 8px rgba(0,0,0,.2)' }}
                  onClick={() => val.trim() && pickItem(displayList[0] || { tab: 'playbooks', label: val, type: 'playbook' })}
                  onMouseEnter={e => e.currentTarget.style.background = '#222'}
                  onMouseLeave={e => e.currentTarget.style.background = C.black}>
                  <Icon name="magnifying" size={13} color="#fff" /> Search
                </button>
              </div>
            </div>
          </div>
        </div>

        {/* Dropdown — rendered via fixed positioning to escape ALL stacking contexts */}
        {showDrop && typeof document !== 'undefined' && ReactDOM.createPortal(
          <div id="search-drop" style={{
            position: 'fixed',
            top: dropPos.top, left: dropPos.left, width: dropPos.width,
            background: C.surface,
            border: `1px solid ${C.border}`,
            borderRadius: 18,
            boxShadow: '0 20px 64px rgba(0,0,0,.18)',
            zIndex: 9999,
            overflow: 'hidden',
            animation: 'scaleIn .15s ease both',
            maxHeight: '72vh',
            overflowY: 'auto',
          }}>
            {/* Header row */}

            </div>}

            {/* Grouped results */}
            {val.trim() && groupedResults && ['playbook', 'agent', 'toolkit'].map(type => {
              if (!groupedResults[type]) return null;
              return <div key={type}>
                <div style={{ padding: '10px 20px 5px', display: 'flex', alignItems: 'center', gap: 7, fontSize: 10, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: TYPE_COLORS[type], fontFamily: C.sans }}>
                  <Icon name={type === 'playbook' ? 'bookOpen' : type === 'toolkit' ? 'toolbox' : 'robot'} size={11} color={TYPE_COLORS[type]} />
                  {type === 'playbook' ? 'Playbooks' : type === 'toolkit' ? 'Toolkits' : 'AI Agents'}
                  <span style={{ marginLeft: 'auto', fontFamily: C.mono, fontSize: 10, color: C.t4 }}>{groupedResults[type].length}</span>
                </div>
                {groupedResults[type].map((item, i) => {
                  const globalIdx = displayList.indexOf(item);
                  return <SearchResultRow key={item.id || item.label} item={item} isSel={globalIdx === sel} onPick={pickItem} onHover={() => setSel(globalIdx)} />;

              </div>;
            })}

            {/* Quick suggestions grid — no query */}
            {!val.trim() && <>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0 }}>
                {quickSuggestions.map((item, i) => (
                  <div key={item.label} onClick={() => pickItem(item)} onMouseEnter={() => setSel(i)}
                    style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 20px', cursor: 'pointer', background: i === sel ? item.col + '07' : 'transparent', borderBottom: `1px solid ${C.border}`, borderRight: i % 2 === 0 ? `1px solid ${C.border}` : 'none', transition: 'background .1s' }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: item.col + '14', border: `1.5px solid ${item.col}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <Icon name={item.icon} size={16} color={item.col} />
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: i === sel ? item.col : C.text, fontFamily: C.sans, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.label}</div>
                      <div style={{ fontSize: 11, color: C.t3, fontFamily: C.sans, marginTop: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.sub}</div>
                    </div>
                    <span style={{ fontSize: 10, fontWeight: 600, padding: '2px 8px', borderRadius: 20, background: item.col + '12', color: item.col, fontFamily: C.sans, flexShrink: 0, whiteSpace: 'nowrap' }}>
                      {item.type === 'playbook' ? 'Playbook' : item.type === 'toolkit' ? 'Toolkit' : 'Agent'}
                    </span>
                  </div>
                ))}
              </div>
              {/* Footer */}
              <div style={{ padding: '10px 20px', display: 'flex', gap: 16, alignItems: 'center', background: C.bg, borderTop: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 11, color: C.t4, fontFamily: C.sans }}>↑↓ navigate</span>
                <span style={{ fontSize: 11, color: C.t4, fontFamily: C.sans }}>⏎ open</span>
                <span style={{ fontSize: 11, color: C.t4, fontFamily: C.sans }}>Esc close</span>
              </div>
            </>}

            {/* Search results footer */}
            {val.trim() && filtered.length > 0 && <div style={{ padding: '10px 20px', background: C.bg, borderTop: `1px solid ${C.border}`, display: 'flex', gap: 16, alignItems: 'center' }}>
              <span style={{ fontSize: 11, color: C.t4, fontFamily: C.sans }}>↑↓ navigate</span>
              <span style={{ fontSize: 11, color: C.t4, fontFamily: C.sans }}>⏎ open</span>
              <span style={{ fontSize: 11, color: C.t4, fontFamily: C.sans }}>Esc close</span>
            </div>}
          </div>,
          document.body
        )}
      </>;
    }

    function SearchResultRow({ item, isSel, onPick, onHover }) {
      return <div onClick={() => onPick(item)} onMouseEnter={onHover}
        style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '11px 20px', cursor: 'pointer', background: isSel ? item.col + '08' : 'transparent', borderLeft: `3px solid ${isSel ? item.col : 'transparent'}`, borderBottom: `1px solid ${C.border}`, transition: 'all .1s' }}>

    /* ─── CATEGORY TABS ───────────────────────────── */

          <button key={t.id} onClick={() => setActive(t.id)} style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, padding: '8px 14px', borderRadius: 9, fontSize: 13, fontWeight: active === t.id ? 600 : 400, color: active === t.id ? '#fff' : C.t2, background: active === t.id ? C.black : 'transparent', border: 'none', cursor: 'pointer', fontFamily: C.sans, transition: 'all .15s', letterSpacing: '-0.01em', whiteSpace: 'nowrap' }}>
            <Icon name={t.icon} size={14} color="currentColor" />{t.id}
          </button>
        ))}
      </div>;
    }

    /* ─── HOME PAGE ─────────────────────────────── */

    // Category → content mapping
    const CAT_MAP = {
      All: { pbTags: ['BUILD', 'GROW', 'RAISE', 'OPS', 'ALL'], agCats: ['Growth', 'Marketing', 'Research', 'Fundraising'], tkTags: ['BUILD', 'GROW', 'RAISE', 'OPS', 'ALL'] },
      Build: { pbTags: ['BUILD'], agCats: ['Growth'], tkTags: ['BUILD'] },
      Grow: { pbTags: ['GROW'], agCats: ['Growth', 'Marketing'], tkTags: ['GROW'] },
      Automate: { pbTags: ['OPS'], agCats: ['Research', 'Marketing'], tkTags: ['OPS'] },
      Fundraise: { pbTags: ['RAISE'], agCats: ['Fundraising'], tkTags: ['RAISE'] },
      Content: { pbTags: ['GROW'], agCats: ['Marketing'], tkTags: ['GROW', 'ALL'] },
    };

    function HomePage({ user, toast, testMode, onTab, obAnswers, onDeepLink }) {
      const h = new Date().getHours(); const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
      const isNew = testMode === 'new';
      const active = PLAYBOOKS.filter(p => p.active);
      const [cat, setCat] = useState('All');

      // Auto-personalise category from onboarding answers
      useEffect(() => {
        if (!obAnswers?.goal) return;
        const g = (obAnswers.goal + ' ' + (obAnswers.stage || '')).toLowerCase();
        if (g.includes('fund') || g.includes('raise') || g.includes('investor')) setCat('Fundraise');
        else if (g.includes('automate') || g.includes('ops') || g.includes('workflow')) setCat('Automate');
        else if (g.includes('mrr') || g.includes('customer') || g.includes('revenue') || g.includes('sell') || g.includes('growth')) setCat('Grow');
        else if (g.includes('product') || g.includes('mvp') || g.includes('build') || g.includes('launch')) setCat('Build');
        else if (g.includes('content') || g.includes('seo') || g.includes('blog') || g.includes('linkedin')) setCat('Content');
      }, [obAnswers]);

      const map = CAT_MAP[cat] || CAT_MAP.All;
      const filteredPB = PLAYBOOKS.filter(p => map.pbTags.includes(p.tag));
      const filteredAg = AGENTS.filter(a => map.agCats.includes(a.cat));
      const filteredTK = TOOLKITS.filter(t => map.tkTags.includes(t.tag) || t.tag === 'ALL');

      const inProgressPB = active.filter(p => map.pbTags.includes(p.tag));
      const recommendedPB = filteredPB.filter(p => !p.active).slice(0, 3);

      return <div>

        {/* HEADER */}
        <div className="fu" style={{ marginBottom: 22 }}>
          <h1 style={{ fontFamily: C.heading, fontSize: 32, fontWeight: 800, color: C.text, letterSpacing: '-0.02em', lineHeight: 1.15 }}>{greet}, {user.firstName}.</h1>
          <p style={{ fontSize: 14, color: C.t3, marginTop: 5, fontFamily: C.sans }}>
            {isNew ? "Welcome — let's get your AI Business OS set up." : `${active.length} Playbooks in progress · 1 Agent running.`}
          </p>
        </div>

        {/* AI SEARCH BOX */}
        <div style={{ marginBottom: 22, position: 'relative', zIndex: 10 }}>
          <AISearchBox onTab={onTab} toast={toast} onDeepLink={onDeepLink} />
        </div>

        {/* ── UNIFIED DARK BOX — activity for returning, first-win for new ── */}
        <div className="fu1" style={{ background: `linear-gradient(135deg,${C.black} 0%,#1a0a2e 100%)`, borderRadius: 18, marginBottom: 24, position: 'relative', overflow: 'hidden' }}>
          {/* Background glow orbs */}
          <div style={{ position: 'absolute', top: -40, right: -40, width: 200, height: 200, borderRadius: '50%', background: `radial-gradient(${C.purple}25,transparent 70%)`, pointerEvents: 'none' }} />
          <div style={{ position: 'absolute', bottom: -30, left: -30, width: 140, height: 140, borderRadius: '50%', background: `radial-gradient(${C.pink}15,transparent 70%)`, pointerEvents: 'none' }} />

          <div style={{ position: 'relative', padding: '20px 22px' }}>

            {/* ── RETURNING USER: Recent Activity inside dark box ── */}
            {!isNew && <>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#4ADE80', animation: 'breathe 2s ease infinite', flexShrink: 0 }} />
                  <span style={{ fontSize: 13, fontWeight: 700, color: 'rgba(255,255,255,.9)', fontFamily: C.heading, letterSpacing: '-0.01em' }}>Recent Activity</span>
                </div>
                <button onClick={() => toast('Opening history…')} style={{ fontSize: 12, fontWeight: 600, color: 'rgba(255,255,255,.4)', background: 'rgba(255,255,255,.07)', border: '1px solid rgba(255,255,255,.1)', padding: '4px 12px', borderRadius: 20, cursor: 'pointer', fontFamily: C.sans, transition: 'all .15s' }} onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,.12)'; e.currentTarget.style.color = 'rgba(255,255,255,.8)'; }} onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,.07)'; e.currentTarget.style.color = 'rgba(255,255,255,.4)'; }}>
                  View all →
                </button>
              </div>

              <div style={{ display: 'flex', flexDirection: 'column', gap: 0, borderRadius: 13, overflow: 'hidden', border: '1px solid rgba(255,255,255,.07)' }}>
                {ACTIVITY.slice(0, 4).map((item, i) => {
                  const typeColors = { agent: '#4ADE80', playbook: C.purple, toolkit: '#F59E0B' };
                  const col = typeColors[item.type] || 'rgba(255,255,255,.4)';
                  const badgeColors = { Done: '#4ADE80', Running: C.purple, Saved: 'rgba(255,255,255,.35)' };
                  const bc = badgeColors[item.badge] || 'rgba(255,255,255,.3)';
                  const isLast = i === ACTIVITY.slice(0, 4).length - 1;
                  return <div key={item.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', borderBottom: isLast ? 'none' : '1px solid rgba(255,255,255,.06)', cursor: 'pointer', transition: 'background .12s', background: 'transparent' }}
                    onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,.04)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                    onClick={() => toast(item.title)}>
                    <div style={{ width: 34, height: 34, borderRadius: 9, background: `${col}18`, border: `1px solid ${col}30`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <Icon name={item.icon} size={15} color={col} />
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 500, color: 'rgba(255,255,255,.88)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontFamily: C.sans }}>{item.title}</div>
                      <div style={{ fontSize: 11, color: 'rgba(255,255,255,.35)', marginTop: 2, fontFamily: C.sans }}>{item.sub}</div>
                    </div>
                    <div style={{ textAlign: 'right', flexShrink: 0 }}>
                      <div style={{ fontSize: 11, color: 'rgba(255,255,255,.3)', fontFamily: C.sans, marginBottom: 3 }}>{item.time}</div>
                      <span style={{ fontSize: 10, fontWeight: 700, color: bc, background: `${bc}18`, padding: '2px 8px', borderRadius: 20, fontFamily: C.sans, border: `1px solid ${bc}30` }}>{item.badge}</span>
                    </div>
                  </div>;
                })}
              </div>
            </>}

            {/* ── NEW USER: First win panel inside dark box ── */}
            {isNew && <>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 10 }}>
                <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#4ADE80', animation: 'breathe 2s ease infinite' }} />
                <span style={{ fontSize: 10, fontWeight: 700, color: 'rgba(255,255,255,.4)', letterSpacing: '0.09em', textTransform: 'uppercase', fontFamily: C.sans }}>Get value in under 5 minutes</span>
              </div>
              <h2 style={{ fontFamily: C.heading, fontSize: 21, fontWeight: 800, color: '#fff', marginBottom: 18, lineHeight: 1.2 }}>What's your first win today?</h2>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 9 }}>
                {[
                  { icon: 'target', title: 'Generate first 100 leads', sub: 'Lead Gen Agent · 4 credits · 10 min', col: C.green, tab: 'agents' },
                  { icon: 'bookOpen', title: 'Build your MVP roadmap', sub: 'MVP Builder Playbook · Free · 6 steps', col: C.purple, tab: 'playbooks' },
                  { icon: 'pencil', title: 'Get your GTM strategy', sub: 'GTM Playbook · Free · 4 steps', col: C.amber, tab: 'playbooks' },
                  { icon: 'download', title: 'Download a toolkit', sub: 'MVP Builder Toolkit · 7 assets · Free', col: C.blue, tab: 'toolkits' },
                ].map(w => (
                  <button key={w.title} onClick={() => onTab(w.tab)}
                    style={{ background: 'rgba(255,255,255,.06)', border: '1px solid rgba(255,255,255,.1)', borderRadius: 12, padding: '13px 15px', cursor: 'pointer', textAlign: 'left', transition: 'all .18s', fontFamily: C.sans, display: 'flex', alignItems: 'center', gap: 12 }}
                    onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,.11)'; e.currentTarget.style.borderColor = w.col + '70'; }}
                    onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,.06)'; e.currentTarget.style.borderColor = 'rgba(255,255,255,.1)'; }}>
                    <div style={{ width: 32, height: 32, borderRadius: 8, background: w.col + '22', border: `1px solid ${w.col}40`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <Icon name={w.icon} size={16} color={w.col} />
                    </div>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: '#fff', lineHeight: 1.3 }}>{w.title}</div>
                      <div style={{ fontSize: 11, color: 'rgba(255,255,255,.4)', marginTop: 2 }}>{w.sub}</div>
                    </div>
                  </button>
                ))}
              </div>
              {obAnswers && <div style={{ marginTop: 12, fontSize: 11, color: 'rgba(255,255,255,.3)', fontFamily: C.sans }}>Personalised for: {obAnswers.stage} · Goal: {obAnswers.goal}</div>}
            </>}
          </div>
        </div>

        {/* ── CATEGORY TABS — below the dark box, full width ── */}
        <div style={{ display: 'flex', gap: 5, marginBottom: 28, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 13, padding: '5px', width: '100%' }}>
          {[
            { id: 'All', icon: 'squaresFour' },
            { id: 'Build', icon: 'toolbox' },
            { id: 'Grow', icon: 'target' },
            { id: 'Automate', icon: 'robot' },
            { id: 'Fundraise', icon: 'trophy' },
            { id: 'Content', icon: 'pencil' },
          ].map(t => (
            <button key={t.id} onClick={() => setCat(t.id)}
              style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, padding: '9px 10px', borderRadius: 9, fontSize: 13, fontWeight: cat === t.id ? 700 : 400, color: cat === t.id ? '#fff' : C.t2, background: cat === t.id ? C.black : 'transparent', border: 'none', cursor: 'pointer', fontFamily: C.sans, transition: 'all .15s', whiteSpace: 'nowrap', letterSpacing: '-0.01em' }}>
              <Icon name={t.icon} size={14} color="currentColor" />{t.id}
            </button>
          ))}
        </div>

        {/* ── RECOMMENDED PLAYBOOKS — filtered by cat ── */}
        {recommendedPB.length > 0 && <>
          <div style={{ marginBottom: 14, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <SHd title={cat === 'All' ? 'Recommended Playbooks' : `${cat} Playbooks`} link="Browse all" onLink={() => onTab('playbooks')} />
              {obAnswers?.goal && cat !== 'All' && <div style={{ fontSize: 11, color: C.purple, fontFamily: C.sans, marginTop: 2, display: 'flex', alignItems: 'center', gap: 5 }}>
                <Icon name="sparkle" size={10} color={C.purple} />
                Personalised for your goal: {obAnswers.goal.slice(0, 40)}{obAnswers.goal.length > 40 ? '…' : ''}
              </div>}
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 13, marginBottom: 28 }}>
            {recommendedPB.map(pb => {
              const handleOpen = p => {
                onTab('playbooks');
                if (onDeepLink) setTimeout(() => onDeepLink({ type: 'playbook', id: p.id }), 80);
              };
              return <RecCard key={pb.id} pb={pb} toast={toast} onOpen={handleOpen} />;
            })}
          </div>
        </>}
        {recommendedPB.length === 0 && filteredPB.filter(p => !p.active).length === 0 && <div style={{ background: C.surface, border: `1px dashed ${C.borderS}`, borderRadius: 14, padding: '32px', textAlign: 'center', marginBottom: 28 }}>

          <div style={{ fontSize: 13, fontWeight: 600, color: C.text, fontFamily: C.heading }}>No {cat} Playbooks yet</div>

        </div>}

        {/* ── AI AGENTS — filtered by cat ── */}
        {filteredAg.length > 0 && <>
          <SHd title={cat === 'All' ? 'AI Agents' : 'Top Agents for ' + cat} link="View all agents" onLink={() => onTab('agents')} style={{ marginBottom: 14 }} />
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 13, marginBottom: 28 }}>
            {filteredAg.slice(0, 3).map(ag => (
              <HomeAgentCard key={ag.id} agent={ag} toast={toast} onTab={onTab} onDeepLink={onDeepLink} />
            ))}
          </div>
        </>}

        {/* ── TOOLKITS — filtered by cat ── */}
        {filteredTK.length > 0 && <>
          <SHd title={cat === 'All' ? 'Toolkits' : 'Top Toolkits for ' + cat} link="Browse toolkits" onLink={() => onTab('toolkits')} style={{ marginBottom: 14 }} />
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 11, marginBottom: 8 }}>
            {filteredTK.slice(0, 4).map(tk => (
              <HomeTKCard key={tk.id} toolkit={tk} toast={toast} onTab={onTab} onDeepLink={onDeepLink} />
            ))}
          </div>
        </>}

      </div>;
    }

    /* ── HOME AGENT CARD ── */
    function HomeAgentCard({ agent, toast, onTab, onDeepLink }) {
      const [h, setH] = useState(false);
      const running = agent.status === 'running';
      const handleClick = () => {
        onTab('agents');
        if (onDeepLink) setTimeout(() => onDeepLink({ type: 'agent', id: agent.id }), 80);
      };
      return <div onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
        style={{ background: C.surface, border: `1px solid ${h ? C.purple + '50' : running ? C.purple + '30' : C.border}`, borderRadius: 14, padding: 16, cursor: 'pointer', transition: 'all .18s', boxShadow: h ? `0 8px 28px ${C.purple}14` : 'none', transform: h ? 'translateY(-2px)' : 'none' }}
        onClick={handleClick}>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 12 }}>
          <div style={{ width: 38, height: 38, borderRadius: 10, background: running ? C.purple + '15' : C.bg, border: `1px solid ${running ? C.purple + '30' : C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <Icon name={agent.icon} size={18} color={running ? C.purple : C.t2} />

            { num: '19', text: 'I want to improve the ranking of [article URL or title] which currently ranks at position [N] for [keyword]. The article has been live for [N] months. Help me diagnose: (1) based on the search intent, is my content actually answering the right question, (2) what subtopics are likely covered by the pages currently outranking me, (3) what 3 specific improvements to the article would most improve its ranking, and (4) what internal linking additions would strengthen this article\'s authority.', useWhen: 'Improving an article that is ranking but not on page one' },
            { num: '20', text: 'Design my 6-month SEO investment plan. My current blog: [describe — number of articles, current organic traffic if known, any articles that already rank]. My target: [N] organic visitors per month generating [N] qualified leads. Recommend: (1) the first comparison page to write immediately for commercial intent, (2) the content cluster to build first for maximum topical authority, (3) the publishing cadence I can sustain with [N] hours per week, and (4) the leading metrics to track monthly.', useWhen: 'Planning your 6-month SEO investment before committing founder time to content creation' },
          ]
        },
        {
          num: 5, title: 'Community-Led Growth',
          sub: 'Generate warm inbound leads at $0 CAC',
          overview: 'Community-led growth builds genuine presence, trust, and authority in the communities where your ICP already spends time. Done correctly, it generates warm inbound leads at zero direct cost. Done incorrectly — by showing up only to promote your product — it damages your reputation.',
          reading: 'The 30-minute daily community engagement routine:\n\nMORNING (15 min): Check your 2 primary Slack communities. Answer 1-2 questions in your area of expertise — genuinely and specifically. Use Claude for research support, then add your own experience. Never paste AI output directly.\n\nAFTERNOON (15 min): Reply to every comment on your LinkedIn posts. Comment on 3-5 posts from your ICP with a substantive response.\n\nWEEKLY (30 min extra): Post one original insight in your primary Slack community. Not "Check out our new feature." Instead: "We noticed this pattern across [N] customers and wanted to share it."\n\nMONTHLY: Host a community AMA or webinar. Share a research finding or framework from your product data.\n\nThe highest-impact community tactic: create the resource your ICP community does not yet have — the definitive guide, the tool comparison, the template library — and make it freely available.',
          prompts: [
            { num: '21', text: 'I want to build a community presence in [specific community or platform]. My ICP: [describe]. My expertise area: [describe]. Design my 90-day community engagement plan: (1) the 5 types of posts/questions I should engage with most, (2) the 3 types of original content I should share in the community, (3) the one community resource I should create in month 2, and (4) the specific metric I will use to measure whether my community presence is generating warm leads.', useWhen: 'Building a systematic community engagement plan before investing time in a specific community' },
            { num: '22', text: 'Someone just posted this question in my target community: "[paste the question]". Help me write a genuinely useful, specific answer that: demonstrates expertise without mentioning my product, is at least 3 paragraphs with a specific example or framework, and positions me as the kind of person worth following. Give me a draft I can edit and personalise, not paste directly.', useWhen: 'Writing a high-quality community answer that builds credibility over time' },
            { num: '23', text: 'I want to create a free resource that my ICP community will genuinely value and share. My ICP: [describe]. The community: [describe]. The gap I have noticed: [what does your community ask about repeatedly that does not have a good resource yet?]. Design: (1) the specific resource to create (template, guide, benchmark, or tool), (2) the outline and structure, (3) the distribution plan within the community and outside it, and (4) how to use it to build an email list from the downloads.', useWhen: 'Designing the community resource that establishes your expertise and drives inbound' },
            { num: '24', text: 'I want to host an AMA or webinar in my target community. Topic: [describe your expertise area]. Audience: [describe]. Design: (1) how to pitch the AMA to the community moderator, (2) the announcement post to drive maximum attendance, (3) the 10 questions I should prepare answers for, (4) how to follow up with attendees after the event, and (5) how to repurpose the AMA into content for other channels.', useWhen: 'Running a community AMA that builds authority and generates warm leads' },
            { num: '25', text: 'Design a free lead magnet for my highest-traffic article about [topic]. My ICP: [describe]. The article gets [N] visitors per month at [X]% email capture rate. Design: (1) the specific lead magnet most relevant to this article\'s audience, (2) the offer positioning — what headline makes someone give their email, (3) the delivery sequence (email with download, 2-day follow-up, 5-day soft CTA), and (4) what conversion rate improvement I should expect.', useWhen: 'Designing a lead magnet for your best article to capture warm leads from organic traffic' },
          ]
        },
        {
          num: 6, title: 'Inbound Conversion',
          sub: 'Turn every inbound signal into pipeline efficiently',
          overview: 'Traffic without conversion is vanity. This step covers the conversion layer — the systems that turn a visitor into a meeting and a meeting into a customer.',
          reading: 'The inbound conversion stack:\n\n• HOMEPAGE CTA: One primary CTA only — "Book a demo" or "Start free trial." Use Calendly embedded directly. One fewer click = meaningful conversion improvement.\n\n• LANDING PAGES: Dedicated pages matching specific ads or content. Generic homepages convert 1-3%. Matched landing pages convert 6-12%.\n\n• EXIT INTENT: Exit-intent popup on high-traffic non-converting pages. Offer a specific lead magnet. Converts 3-8% of abandoning visitors.\n\n• DEMO BOOKING FRICTION: Remove all mandatory fields except name and email. Let Calendly ask qualifying questions after booking, not before.\n\nThe instant follow-up workflow: Demo request submitted → Within 2 minutes: Zapier pulls data → Clay enriches the company → Claude generates a personalised follow-up email → Auto-sent from founder\'s address. Within 5 minutes (working hours): founder sends personal LinkedIn connection request. A lead followed up within 5 minutes is 9x more likely to convert than one followed up after 30 minutes.',
          prompts: [
            { num: '26', text: 'Audit my website\'s conversion funnel. Here is my current setup: [describe your homepage CTA, any landing pages, lead capture points, and average conversion rate if known]. Help me identify: (1) the 3 highest-impact conversion improvements I can make this week without redesigning the site, (2) where visitors are most likely dropping off, (3) the lead magnet I should create for my highest-traffic page, and (4) how to implement exit-intent capture without being annoying.', useWhen: 'Auditing your website conversion funnel to find quick wins before investing in paid traffic' },
            { num: '27', text: 'Design my instant follow-up workflow for demo requests. My tools: [CRM, email tool, Zapier or Make, any enrichment tools]. When someone requests a demo, I want to send an automated personalised email within 2 minutes. Write: (1) the Zapier workflow steps, (2) the Clay enrichment columns to pull, (3) the Claude prompt that generates the personalised email from the enrichment data, and (4) the email template structure with placeholder fields.', useWhen: 'Building the 2-minute demo follow-up workflow that converts at significantly higher rates' },
            { num: '28', text: 'Write the AI-powered website chat script for Intercom Fin or Drift. My product: [describe]. My ICP: [describe]. Top 5 questions visitors ask: [list]. The chat should: greet visitors after 30 seconds on key pages, answer FAQs from our documentation, qualify leads by asking 2 questions (company size and use case), and book demos for qualified leads. Write the greeting message, the 5 FAQ responses, the qualification flow, and the handoff message when a meeting is booked.', useWhen: 'Configuring your AI website chat to qualify and book leads 24 hours a day' },
            { num: '29', text: 'Build me a GTM analytics dashboard specification. My channels: [list your active channels]. My CRM: [HubSpot or other]. My tools: [list all GTM tools you use]. Design: (1) the 8 most important metrics to track, (2) the data source and update frequency for each metric, (3) how to build the channel attribution model for my sales cycle length of [N] weeks, and (4) the weekly report template I should review every Monday.', useWhen: 'Designing your GTM analytics dashboard before your channels produce enough data' },
            { num: '30', text: 'Here is my GTM performance data for the last [N] weeks: [paste data — outbound metrics, content metrics, pipeline metrics, revenue by source]. Write a 250-word GTM analysis: (1) what is working better than expected, (2) what is underperforming and the most likely cause, (3) the channel generating the highest revenue per dollar or hour invested, (4) the channel I should reduce or eliminate, and (5) the specific action to take this week based on the data.', useWhen: 'Generating a weekly AI narrative from your GTM dashboard data' },
          ]
        },
        {
          num: 7, title: 'GTM Analytics',
          sub: 'Know exactly what to double down on every week',
          overview: 'The most common mistake in GTM is investing in channels that feel productive but don\'t produce revenue. GTM analytics exists to protect your time and money — by measuring only what actually matters.',
          reading: 'Track fewer metrics more carefully. The only metrics that matter at each funnel stage:\n\n• AWARENESS: Qualified website visitors per month (ICP-filtered, not all traffic). Target: 500+ qualified visitors/month.\n\n• ENGAGEMENT: Content engagement rate (LinkedIn), email open rate. Below 2% engagement or 30% open rate = messaging problem.\n\n• CONSIDERATION: Qualified demo requests per month. Below 20 for self-serve or 10 for high-touch = conversion problem.\n\n• CONVERSION: Close rate from qualified demo. Below 20% = positioning, product, or sales process gap.\n\n• REVENUE: New MRR per channel per month. The only metric that matters at the end of every analysis.\n\n• EFFICIENCY: CAC by channel. A CAC above your 12-month LTV = channel to eliminate.\n\nThe 30-minute Monday GTM review: 10 min — pipeline health (meetings booked, pipeline-to-close ratio). 10 min — channel performance (outbound, content, inbound). 10 min — priorities (one thing to start, one thing to stop).',
          prompts: [
            { num: '31', text: 'Help me prioritise my GTM channels. My product: [describe]. My ACV: $[X]/year. My ICP: [describe]. My current team: [describe — founder only, or additional GTM hires]. My current channels and results: [describe what you are doing and what it produces]. Given the channel selection framework, recommend: (1) the 2 channels to focus on exclusively for the next 90 days, (2) the channels to pause, and (3) the channel to add at the 90-day mark if the primary 2 are working.', useWhen: 'Deciding which GTM channels to focus on and which to deprioritise at your current stage' },
            { num: '32', text: 'I want to run a 4-week test of [channel]. Define: (1) the minimum viable test setup for this channel (tools, time, budget), (2) the 1 success metric and 1 failure metric I will use to judge it at week 4, (3) the specific actions to take in each of the 4 weeks, and (4) what "in between" looks like — if results are mixed, what is the one change to test in week 5 before making a final decision.', useWhen: 'Running a structured 4-week channel test before committing significant time or budget' },
            { num: '33', text: 'I am investing [N hours] per week in GTM. Here is how I currently allocate that time across channels: [paste allocation]. Based on my current metrics [paste], help me redesign the time allocation to maximise qualified meetings per hour invested. Show me: (1) which activities I should eliminate or reduce, (2) which I should increase, (3) the new time allocation by channel, and (4) the expected pipeline impact of the change.', useWhen: 'Redesigning your GTM time allocation to maximise meetings per hour invested' },
            { num: '34', text: 'Write my GTM strategy memo for the next 90 days. My starting point: $[X] MRR, [N] customers, [describe current channels and their performance]. My 90-day goal: $[Y] MRR. The memo should cover: (1) the 2 channels I will focus on exclusively, (2) the weekly output targets for each channel, (3) the metrics I will review every Monday, (4) the resource investment required (time and budget), and (5) the trigger that would cause me to change strategy mid-quarter.', useWhen: 'Writing a 90-day GTM strategy memo before the quarter starts' },
            { num: '35', text: 'I am at $[X] MRR with [Y]% MoM growth. I need to reach $100K MRR in [N] months. My current acquisition channels: [describe with monthly lead and close volumes]. Help me model: (1) the number of new customers I need per month to hit the target, (2) whether my current channel capacity can produce that volume, (3) which channel I need to add or scale to close the gap, and (4) the specific weekly actions required across all channels to be on pace.', useWhen: 'Building the channel capacity model to reach $100K MRR from your current position' },
          ]
        },
        {
          num: 8, title: 'Channel Prioritisation',
          sub: 'Identify your two highest-leverage channels and build them first',
          overview: 'Not every channel in this playbook is right for every startup at every stage. Building all channels simultaneously produces mediocre results in all of them. The correct approach: identify the two highest-leverage channels for your specific situation and build those to consistent performance before adding a third.',
          reading: 'Channel selection by ACV:\n\n• Under $500/year (PLG/self-serve): SEO + product-led content is primary. Community-led is secondary — word of mouth in practitioner communities drives most PLG growth.\n\n• $500–$5,000/year (SMB SaaS): AI outbound + LinkedIn content is primary. Signal-based triggers (funding, job changes) is secondary.\n\n• $5,000–$25,000/year (mid-market): Signal-based outbound + content is primary. LinkedIn founder brand is secondary — buyers research the founder before the product.\n\n• Above $25,000/year (enterprise): Account-based GTM with personalised multi-channel campaigns is primary. Executive events and thought leadership is secondary.\n\nThe 4-week channel test protocol: Week 1 — setup, define 1 success metric and 1 failure metric. Weeks 2-3 — minimum viable test (200 cold emails, 2 articles, 30 min/day in community). Week 4 — measure and decide. Did you hit success metric? Scale. Hit failure metric? Kill. In between? One more week with one change.\n\nNote: SEO and community require 3-6 months before judging — this is the exception to the 4-week rule.',
          prompts: [
            { num: '36', text: 'My GTM is currently founder-led and I need to hand off parts of it to my first GTM hire. I am bringing on a [role — SDR, AE, marketing manager, or content hire]. Design the handoff plan: (1) which specific GTM activities to hand off in week 1, (2) which to keep founder-owned for now, (3) how to document the activities being handed off so the new hire can execute independently, and (4) the quality bar I will hold this person to at 30 and 60 days.', useWhen: 'Handing off founder-led GTM activities to your first hire without losing quality or pipeline' },
            { num: '37', text: 'My outbound reply rate is [X]% but my meetings-booked rate from replies is only [Y]%. Most replies are positive but do not convert to a booked meeting. Help me: (1) analyse the most common reasons why someone replies positively to a cold email but does not book a meeting, (2) rewrite my CTA to make booking easier and more natural, (3) design the reply sequence — what to say when someone replies "interested" but does not book, and (4) identify whether this is a friction problem or a relevance problem.', useWhen: 'Improving meeting conversion from positive email replies' },
            { num: '38', text: 'I want to build a multi-channel outbound sequence that combines email + LinkedIn. For each prospect, the sequence should: Day 1 — cold email, Day 2 — LinkedIn connection request, Day 5 — LinkedIn message (if connected), Day 8 — second email, Day 12 — LinkedIn engagement with their content, Day 15 — final email. Write the copy for each touchpoint for my ICP [describe]. Each touchpoint should be a different angle, not a repeat of the previous one.', useWhen: 'Building a multi-channel outbound sequence that combines email and LinkedIn touchpoints' },
            { num: '39', text: 'I want to build a newsletter that becomes a primary acquisition channel. My ICP: [describe]. My unique perspective or data advantage: [describe]. Design: (1) the newsletter positioning and name, (2) the content format and cadence, (3) the growth strategy for the first 1,000 subscribers, (4) how to monetise or convert subscribers to pipeline, and (5) the 3-month editorial calendar for the first issues.', useWhen: 'Launching a newsletter as a long-term acquisition channel' },
            { num: '40', text: 'Write the GTM State of the Union — a quarterly memo summarising what our GTM engine looks like, what we have learned, and where we are going. Cover: (1) channel performance this quarter — what worked, what did not, (2) the ICP and messaging insights we gained from deals won and lost, (3) the one GTM decision that most impacted our results, (4) what we will do differently next quarter, and (5) the single GTM investment we are making next quarter and why. Use this data: [paste your quarter\'s GTM metrics].', useWhen: 'Writing the quarterly GTM retrospective that keeps your strategy current and shareable with investors' },
          ]
        },
      ],
      3: [
        {
          num: 1, title: 'Define Your ICP', sub: 'Get crystal-clear on who your first 100 customers are', overview: 'Most founders skip ICP definition and wonder why their outreach fails. Your first 100 customers are not "everyone." They are a specific person at a specific type of company facing a specific problem right now. This step forces the precision that makes every downstream effort work.', prompts: [
            { num: '01', text: 'Describe your best current customer (or the customer you most want). Company size, industry, role, pain they have, how they found you, why they bought. Be as specific as possible.', useWhen: 'Starting ICP definition from scratch' },
            { num: '02', text: 'Write 3 versions of my ICP — narrow (most likely to buy now), medium (likely to buy in 90 days), and broad (eventually). For each: job title, company type, size, industry, the problem they have, and the trigger that makes them buy.', useWhen: 'Creating a tiered ICP definition' },
            { num: '03', text: 'What are the top 5 signals that tell me someone is my ICP right now — not someday? Think: job title, tech stack they use, company size, recent company event, or behaviour.', useWhen: 'Building ICP qualification criteria' },
            { num: '04', text: 'Write 10 qualifying questions I can ask in a discovery call to determine whether someone is my ideal customer within the first 5 minutes.', useWhen: 'Building sales qualification framework' },
            { num: '05', text: 'Where do my ICP spend time online? List the specific communities, forums, LinkedIn groups, newsletters, and events they attend. How do I find and reach them there?', useWhen: 'Identifying ICP watering holes for outreach' },
          ], done: false, active: true
        },
        {
          num: 2, title: 'Nail Your Messaging', sub: 'Make your value proposition impossible to ignore', overview: 'If you cannot explain what you do in one sentence that makes your ICP say "I need that," no amount of distribution will fix it. This step builds the messaging hierarchy — from your one-liner to your full pitch.', prompts: [
            { num: '06', text: 'Write my one-sentence value proposition using this format: "We help [ICP] achieve [outcome] without [the thing they hate doing]." Give me 5 variations.', useWhen: 'Writing core value proposition' },
            { num: '07', text: 'What are the top 3 objections my ICP has before buying? For each objection, write the response that addresses it honestly and builds trust.', useWhen: 'Preparing objection handling' },
            { num: '08', text: 'Write a cold email subject line A/B test. Give me 5 subject lines for my ICP [describe]. For each: the psychological trigger it uses (curiosity, relevance, pain, social proof, or urgency).', useWhen: 'Writing outreach subject lines' },
            { num: '09', text: 'Write my 30-second pitch for my ICP [describe]. It should open with the problem, describe the solution in plain language, give one proof point, and end with a clear next step.', useWhen: 'Preparing verbal pitch for calls and events' },
            { num: '10', text: 'My ICP cares most about [outcome]. Write 3 completely different homepage headline options — one leading with the problem, one with the outcome, one with the mechanism.', useWhen: 'Writing homepage and landing page copy' },
          ], done: false
        },
        {
          num: 3, title: 'First 10 Customers', sub: 'Get to 10 paying customers by hand — do things that don\'t scale', overview: 'Your first 10 customers cannot come from automated systems. They come from founder relationships, direct outreach, and community. This is the phase where you close deals manually and learn what actually works before you systematise it.', prompts: [
            { num: '11', text: 'List every person I know who is my ICP or knows someone who is. Draft a personalised outreach message for the top 10 — reference our relationship, be specific about what I\'m building, and make a direct ask.', useWhen: 'Warm outreach to existing network' },
            { num: '12', text: 'I want to find my first customers in online communities. Write a community engagement strategy for [specific community]. What questions should I answer? What value should I share? When and how do I mention my product?', useWhen: 'Finding first customers in communities' },
            { num: '13', text: 'Write a cold outreach sequence (3 emails) targeting [specific ICP]. Email 1: personalised opener + problem + single ask. Email 2 (day 4): different angle + social proof. Email 3 (day 9): breakup + genuine value. Each under 80 words.', useWhen: 'Cold email outreach to ICP' },
            { num: '14', text: 'I just got on a discovery call with a potential customer. Write 10 questions I should ask to understand their problem deeply, qualify them as a customer, and uncover what it would take for them to buy.', useWhen: 'Running discovery calls' },
            { num: '15', text: 'A prospect said they\'re interested but not ready to buy. Write a follow-up strategy: what to send, when to send it, and how many touches before I move on.', useWhen: 'Following up with warm prospects' },
          ], done: false
        },
        {
          num: 4, title: 'Scale to 100', sub: 'Build the repeatable motion that goes from 10 to 100', overview: 'Once you have 10 customers and know what works, you systematise. This step builds the repeatable acquisition motion — the channels, the sequence, the referral loop — that takes you from 10 to 100 without burning out.', prompts: [
            { num: '16', text: 'I have 10 customers. Analyse what they have in common: same industry, company size, role, problem, referral source. Based on this pattern, define my refined ICP and the acquisition channel that brought in the most of them.', useWhen: 'Identifying your best acquisition channel from early customers' },
            { num: '17', text: 'Design a referral system for my first 10 customers. What incentive would make them refer me to 2 other people? How do I ask? Write the exact message I send to each customer.', useWhen: 'Building a referral programme' },
            { num: '18', text: 'I want to go from 10 to 100 customers in [N] months. My current close rate from discovery call is [X]%. How many discovery calls do I need per month? How many outreach messages do I need to send? Build the reverse funnel for me.', useWhen: 'Planning the 10-to-100 growth math' },
            { num: '19', text: 'Build me a simple CRM workflow for tracking my pipeline: Lead → Contacted → Discovery Call → Proposal → Won/Lost. What fields should I track? What should I review weekly?', useWhen: 'Setting up your first sales pipeline' },
            { num: '20', text: 'Write a 30-day sprint plan to close my next 10 customers. What should I do every day? Break it into: outreach targets (who), messages (what), and channels (where). Be specific and actionable.', useWhen: 'Planning an intensive customer acquisition sprint' },
          ], done: false
        },
        {
          num: 5, title: 'Retain & Expand', sub: 'Make your first 100 customers stay and refer others', overview: 'Getting to 100 customers only matters if they stay. A leaky bucket — customers churning as fast as you acquire them — kills companies. This step builds the retention loop and the expansion motion.', prompts: [
            { num: '21', text: 'What is the one moment in my product where a customer first experiences real value (the "aha moment")? How do I get every new customer to that moment within their first 7 days?', useWhen: 'Designing customer onboarding' },
            { num: '22', text: 'Write a 30-day onboarding email sequence for a new customer. Each email should: celebrate a milestone, teach one key feature, and ask one question to understand their progress.', useWhen: 'Building automated onboarding sequences' },
            { num: '23', text: 'I have [N] customers. Design a monthly health check: which customers are at risk of churning (signals), what I say to them, and what I offer to keep them.', useWhen: 'Building customer health monitoring' },
            { num: '24', text: 'Write a customer success interview script I can use with my happiest customers. I want to: understand what they value most, get a testimonial, and identify upsell opportunities.', useWhen: 'Running customer success interviews' },
            { num: '25', text: 'Design an expansion revenue motion: how do I get existing customers to upgrade, buy more seats, or buy additional products? What triggers the conversation? Write the exact message.', useWhen: 'Building upsell and expansion revenue' },
          ], done: false
        },
      ],
      4: [
        {
          num: 1, title: 'Problem Validation', sub: 'Prove the problem is real, widespread, and painful enough to pay for', overview: 'Building without validation is the most common founder mistake. You need evidence — not opinion — that the problem you\'re solving is real, frequent, and painful enough that people will pay to fix it. Validation before building saves months.', prompts: [
            { num: '01', text: 'Write a problem hypothesis in this format: "[Target customer] struggles with [specific problem] when [specific situation occurs]. Currently they solve it by [current solution] which is bad because [specific reason]. We believe [X]% of [target market] has this problem."', useWhen: 'Articulating your problem hypothesis before validation' },
            { num: '02', text: 'Design a 10-question customer discovery interview script focused purely on the problem — not my solution. Questions should uncover: frequency, severity, current workarounds, and willingness to pay. No leading questions.', useWhen: 'Running problem discovery interviews' },
            { num: '03', text: 'I ran [N] customer interviews. Here are my notes: [paste notes]. Synthesise the key findings: what problem patterns appeared in more than 50% of interviews, what surprised me, and what my hypothesis got wrong.', useWhen: 'Synthesising interview data after discovery' },
            { num: '04', text: 'What are 3 existing behaviours that prove this problem is real without me having to ask anyone? (e.g. people paying for workarounds, Reddit threads complaining about X, job postings looking for someone to solve X manually)', useWhen: 'Finding existing evidence of a problem without primary research' },
            { num: '05', text: 'How do I validate willingness to pay before building anything? Design 3 validation experiments I can run in the next 2 weeks — each one tests a different aspect of the problem-solution fit.', useWhen: 'Designing pre-build validation experiments' },
          ], done: false, active: true
        },
        {
          num: 2, title: 'Solution Validation', sub: 'Test your solution concept before writing a line of code', overview: 'Validating the problem is only half the battle. You also need to validate that YOUR solution — not just a solution — is something people want and will pay for. This step tests your approach before you invest months building it.', prompts: [
            { num: '06', text: 'Describe my proposed solution in 2 sentences. Now write the strongest possible case AGAINST building it — why it won\'t work, why customers won\'t buy it, why competitors will win.', useWhen: 'Steel-manning your solution before committing to build' },
            { num: '07', text: 'Design a landing page test to validate my solution concept. What headline, subheadline, and CTA should I use? What would a 3% conversion rate tell me? What would 0.5% tell me?', useWhen: 'Building a validation landing page' },
            { num: '08', text: 'I want to do a concierge MVP — manually deliver the value my product promises before building it. Design the concierge playbook: what I do manually, how I deliver it, what I charge, and what I learn from each delivery.', useWhen: 'Running a concierge MVP to validate solution value' },
            { num: '09', text: 'Write a solution validation interview script for customers who have seen my demo or mockup. I want to understand: does this solve the right problem, what features matter most, what\'s confusing, and would they pay [price]?', useWhen: 'Validating solution with customer interviews post-demo' },
            { num: '10', text: 'I need to validate pricing before launch. Design a pricing conversation script and 3 different pricing experiments I can run with 10 potential customers each to find the right price point.', useWhen: 'Validating pricing before product launch' },
          ], done: false
        },
        {
          num: 3, title: 'Build Signal Metrics', sub: 'Define what PMF looks like before you claim you have it', overview: 'Product-Market Fit is not a feeling. It is a measurable state. Before you can claim PMF, you need to define what the signals are for YOUR product — the specific metrics that prove customers love what you\'ve built enough to stick and refer.', prompts: [
            { num: '11', text: 'What is the Sean Ellis test score for my product? Write the survey I should send to my first 50 active users and define what "very disappointed" threshold I\'m aiming for and why.', useWhen: 'Running the classic PMF survey' },
            { num: '12', text: 'Design my retention curve analysis. What does "active" mean for my product (daily/weekly/monthly)? What does a healthy D30 retention look like? What cohort analysis should I run to spot PMF?', useWhen: 'Building retention metrics to measure PMF' },
            { num: '13', text: 'I have [N] customers. Calculate my NPS from these scores: [paste scores]. For each detractor, what follow-up question should I ask to understand why? For each promoter, how do I turn them into referral sources?', useWhen: 'Calculating and acting on NPS data' },
            { num: '14', text: 'Write a weekly product metrics dashboard template. What are the 5-7 metrics that would tell me whether I\'m moving toward or away from PMF? For each: definition, target, and what to do if it\'s below target.', useWhen: 'Building your PMF measurement dashboard' },
            { num: '15', text: 'My churn rate is [X]% monthly. Diagnose: is this a product problem, an ICP problem, or an onboarding problem? Design 3 experiments to identify the root cause and reduce churn by 30% in 60 days.', useWhen: 'Diagnosing and fixing early churn' },
          ], done: false
