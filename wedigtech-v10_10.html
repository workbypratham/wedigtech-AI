    const PB_BUILDER_FLOW = [
      { key: 'goal', q: 'What business outcome do you want this Playbook to achieve?', placeholder: 'e.g. Acquire my first 100 paying customers, Launch my SaaS product, Close a pre-seed round…', type: 'text' },
      { key: 'audience', q: 'Who is this Playbook for?', type: 'pills', opts: ['Solo founder', 'Early team (2–5)', 'Agency owner', 'Product manager', 'Marketing lead', 'Freelancer'] },
      { key: 'timeframe', q: 'How long should the full Playbook take?', type: 'pills', opts: ['Under 2 hours', 'Half a day', '1–2 days', '1 week', '2–4 weeks', 'Ongoing'] },
      { key: 'depth', q: 'How detailed should each step be?', type: 'pills', opts: ['Quick & actionable (30 prompts)', 'Thorough & structured (50 prompts)', 'Deep-dive (70+ prompts)'] },
      { key: 'steps', q: 'How many phases do you want?', type: 'pills', opts: ['3 steps', '4 steps', '5 steps', '6 steps', '7 steps', '8 steps'] },
    ];

    const AG_BUILDER_FLOW = [
      { key: 'outcome', q: 'What specific outcome should this Agent deliver?', placeholder: 'e.g. Find 500 warm leads in the EdTech space in India, Write 20 LinkedIn posts from my blog content…', type: 'text' },
      { key: 'input', q: 'What will the Agent need from you to run?', type: 'pills', opts: ['Just a topic/keyword', 'A URL or link', 'A file or document', 'A list (CSV/text)', 'A short description', 'Multiple inputs'] },
      { key: 'output', q: 'What format should the output be in?', type: 'pills', opts: ['CSV / spreadsheet', 'Written content', 'Report / PDF', 'Email sequences', 'Summary + insights', 'Structured data'] },
      { key: 'speed', q: 'How fast should it run?', type: 'pills', opts: ['Instant (< 2 min)', 'Fast (2–10 min)', 'Thorough (10–30 min)', 'Deep analysis (30+ min)'] },
      { key: 'credits', q: 'How many growth actions is this worth?', type: 'pills', opts: ['1–2 actions (simple)', '3–4 actions (medium)', '5–6 actions (complex)', '7+ actions (enterprise)'] },
    ];

    function AIBuilderModal({ type, onClose, toast }) {
      // type = 'playbook' | 'agent'
      const flow = type === 'playbook' ? PB_BUILDER_FLOW : AG_BUILDER_FLOW;
      const [step, setStep] = useState(-1); // -1 = chat intro
      const [answers, setAnswers] = useState({});
      const [inputVal, setInputVal] = useState('');
      const [msgs, setMsgs] = useState([]);
      const [building, setBuilding] = useState(false);
      const [built, setBuilt] = useState(null);
      const [thinking, setThinking] = useState(false);
      const msgRef = useRef();
      const inputRef = useRef();
      const col = type === 'playbook' ? C.purple : C.black;
      const icon = type === 'playbook' ? 'bookOpen' : 'robot';
      const title = type === 'playbook' ? 'Playbook Builder' : 'Agent Builder';

      useEffect(() => {
        // Opening message
        setThinking(true);
        setTimeout(() => {
          setThinking(false);
          const intro = type === 'playbook'
            ? `Hey! I'm going to help you build a custom Playbook in about 2 minutes.\n\nA Playbook is a step-by-step AI execution system — phases, AI prompts, and a clear outcome. You'll use it yourself or share it with your team.\n\nLet's start: **${flow[0].q}**`
            : `Hey! Let's build a custom AI Agent together.\n\nAn Agent is an automated task runner — you give it inputs, it does the work, you get results in minutes.\n\nFirst question: **${flow[0].q}**`;
          setMsgs([{ role: 'assistant', text: intro }]);
          setStep(0);
        }, 700);
      }, []);

      useEffect(() => {
        setTimeout(() => msgRef.current?.scrollTo({ top: 99999, behavior: 'smooth' }), 80);
      }, [msgs, thinking]);

      const sendAnswer = async (val) => {
        if (!val.trim()) return;
        const cur = flow[step];
        const newAnswers = { ...answers, [cur.key]: val };
        setAnswers(newAnswers);
        setMsgs(p => [...p, { role: 'user', text: val }]);
        setInputVal('');
        setThinking(true);

        await new Promise(r => setTimeout(r, 800));

        const nextStep = step + 1;
        if (nextStep < flow.length) {
          const nextQ = flow[nextStep];
          const bridges = type === 'playbook' ? [
            `Great — "${val}" is a solid north star. `,
            `Perfect. Knowing your audience helps me tailor the AI prompts. `,
            `Got it. I'll structure the phases to fit that timeline. `,
            `Understood — I'll calibrate the prompt depth. `,
          ] : [
            `Clear outcome. I'll design the Agent around that. `,
            `Good — I'll set up the input handler for that. `,
            `Got it. I'll format all outputs as ${val.toLowerCase()}. `,
            `Perfect. I'll optimise for that speed tier. `,
          ];
          const bridge = bridges[step] || '';
          setThinking(false);
          setMsgs(p => [...p, { role: 'assistant', text: `${bridge}**${nextQ.q}**` }]);
          setStep(nextStep);
        } else {
          // Final step — generate
          setThinking(false);
          const finalMsg = type === 'playbook'
            ? `Perfect. I have everything I need.\n\nBuilding your **custom Playbook** now — this'll take a moment…`
            : `Got it. All inputs collected.\n\nBuilding your **custom AI Agent** now — generating the logic…`;
          setMsgs(p => [...p, { role: 'assistant', text: finalMsg }]);
          setBuilding(true);

          // Simulate AI generation
          await new Promise(r => setTimeout(r, 2800));

          const builtItem = type === 'playbook' ? {
            id: Date.now(),
            title: newAnswers.goal?.split(' ').slice(0, 4).join(' ') || 'Custom Playbook',
            desc: newAnswers.goal,
            phases: parseInt(newAnswers.phases) || 5,
            prompts: newAnswers.depth?.includes('70+') ? 72 : newAnswers.depth?.includes('50') ? 50 : 30,
            timeLeft: newAnswers.timeframe || '~2 hrs',
            outcome: newAnswers.goal,
            tag: 'BUILD', col: C.purple, cat: 'Custom', done: 0, active: false, reward: '🏆 Custom Badge',
          } : {
            id: Date.now(),
            name: newAnswers.outcome?.split(' ').slice(0, 6).join(' ') || 'Custom Agent',
            shortName: 'Custom Agent',
            desc: newAnswers.outcome,
            roi: 'Custom outcome',
            inputs: [newAnswers.input || 'Your input'],
            time: newAnswers.speed?.split('(')[0].trim() || '10 min',
            credits: parseInt(newAnswers.credits) || 3,
            cat: 'Custom', status: 'idle', runs: 0, lastRun: 'Never', result: null,
            icon: 'sparkle',
          };
          setBuilt(builtItem);
          setBuilding(false);

          const successMsg = type === 'playbook'
            ? `✅ **Your Playbook is ready!**\n\n**"${builtItem.title}"**\n${builtItem.phases} phases · ${builtItem.prompts} AI prompts · ${builtItem.timeLeft}\n\nYou can start it now, or it'll be saved to your Playbooks library.`
            : `✅ **Your Agent is ready!**\n\n**"${builtItem.name}"**\nInputs: ${builtItem.inputs.join(', ')} · ${builtItem.time} · ${builtItem.credits} growth actions\n\nHit "Run Agent" to launch it immediately, or save it to your library.`;
          setMsgs(p => [...p, { role: 'assistant', text: successMsg }]);
        }
      };

      // Format message text — bold **text** and newlines
      const formatMsg = text => text.split('\n').map((line, i) => {
        const parts = line.split(/\*\*(.*?)\*\*/g);
        return <span key={i}>{parts.map((p, j) => j % 2 === 1 ? <strong key={j} style={{ fontWeight: 700, color: C.text }}>{p}</strong> : <span key={j}>{p}</span>)}{i < text.split('\n').length - 1 && <br />}</span>;
      });

      const curStep = flow[step];
      const isTextStep = curStep?.type === 'text';

      return <>
        <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(10,10,11,.55)', backdropFilter: 'blur(7px)', zIndex: 800, animation: 'fadeIn .2s ease', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
          <div onClick={e => e.stopPropagation()} style={{ width: 580, height: '82vh', background: C.surface, borderRadius: 22, zIndex: 801, display: 'flex', flexDirection: 'column', overflow: 'hidden', boxShadow: '0 32px 80px rgba(0,0,0,.32)', animation: 'scaleIn .22s ease both' }}>

            {/* Header */}
            <div style={{ padding: '18px 22px 14px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0, background: `linear-gradient(135deg,${col}08,${col}04)` }}>
              <div style={{ width: 40, height: 40, borderRadius: 11, background: `linear-gradient(135deg,${col},${type === 'playbook' ? C.pink : '#333'})`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <Icon name={icon} size={20} color="#fff" />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: C.text, fontFamily: C.heading }}>{title}</div>
                <div style={{ fontSize: 12, color: C.t3, fontFamily: C.sans }}>Build a custom {type === 'playbook' ? 'Playbook' : 'Agent'} with AI — takes about 2 minutes</div>
              </div>
              {/* Step progress */}
              <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                {flow.map((_, i) => (
                  <div key={i} style={{ width: i <= step ? 16 : 6, height: 6, borderRadius: 3, background: i < step ? col : i === step ? col : '#e5e5e5', transition: 'all .3s' }} />
                ))}
              </div>
              <button onClick={onClose} style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${C.border}`, background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginLeft: 4 }}>
                <Icon name="x" size={14} color={C.t2} />
              </button>
            </div>

            {/* Chat messages */}
            <div ref={msgRef} style={{ flex: 1, overflowY: 'auto', padding: '18px 22px', display: 'flex', flexDirection: 'column', gap: 14 }}>
              {msgs.map((m, i) => (
                <div key={i} style={{ display: 'flex', gap: 10, justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start', animation: 'fadeUp .25s ease both' }}>
                  {m.role === 'assistant' && <div style={{ width: 30, height: 30, borderRadius: 8, background: `linear-gradient(135deg,${col},${type === 'playbook' ? C.pink : '#444'})`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 2 }}><Icon name={icon} size={14} color="#fff" /></div>}
                  <div style={{ maxWidth: '78%', padding: '11px 14px', borderRadius: m.role === 'user' ? '14px 4px 14px 14px' : '4px 14px 14px 14px', background: m.role === 'user' ? col : '#F8F7F5', border: m.role === 'user' ? 'none' : `1px solid ${C.border}`, color: m.role === 'user' ? '#fff' : C.text, fontSize: 13, lineHeight: 1.65, fontFamily: C.sans }}>
                    {formatMsg(m.text)}
                  </div>
                </div>
              ))}

              {/* Thinking dots */}
              {thinking && <div style={{ display: 'flex', gap: 10, animation: 'fadeIn .2s ease' }}>
                <div style={{ width: 30, height: 30, borderRadius: 8, background: `linear-gradient(135deg,${col},${type === 'playbook' ? C.pink : '#444'})`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <Icon name={icon} size={14} color="#fff" />
                </div>
                <div style={{ padding: '12px 16px', borderRadius: '4px 14px 14px 14px', background: '#F8F7F5', border: `1px solid ${C.border}`, display: 'flex', gap: 5, alignItems: 'center' }}>
                  {[0, .18, .36].map(d => <div key={d} style={{ width: 7, height: 7, borderRadius: '50%', background: col, animation: `pulse 1.2s ${d}s infinite` }} />)}
                </div>
              </div>}

              {/* Building animation */}
              {building && <div style={{ background: col + '08', border: `1px solid ${col}20`, borderRadius: 12, padding: '16px 18px', margin: '4px 0', animation: 'fadeUp .3s ease' }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: col, marginBottom: 10, fontFamily: C.sans }}>
                  {type === 'playbook' ? '🏗️ Building your Playbook…' : '⚙️ Building your Agent…'}
                </div>
                {[
                  type === 'playbook' ? ['Defining phases & structure', 'Generating AI prompts per phase', 'Calibrating for your audience', 'Writing phase completion criteria'] :
                    ['Designing agent logic', 'Configuring input handlers', 'Setting output formatters', 'Optimising for your speed tier']
                ][0].map((step, i) => (
                  <div key={step} style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 6, animation: `fadeUp .3s ${i * .15}s ease both` }}>
                    <div style={{ width: 18, height: 18, borderRadius: '50%', background: col, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <div style={{ width: 8, height: 8, borderRadius: '50%', border: `2px solid rgba(255,255,255,.6)`, borderTopColor: '#fff', animation: 'spin .8s linear infinite' }} />
                    </div>
                    <span style={{ fontSize: 12, color: C.t2, fontFamily: C.sans }}>{step}</span>
                  </div>
                ))}
                <div style={{ height: 4, background: `${col}20`, borderRadius: 2, marginTop: 10, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: '70%', background: `linear-gradient(90deg,${col},${type === 'playbook' ? C.pink : '#555'})`, borderRadius: 2, animation: 'shimmer 1.8s linear infinite', backgroundSize: '200% 100%' }} />
                </div>
              </div>}

              {/* Pill options for current step */}
              {!thinking && !building && step >= 0 && step < flow.length && curStep?.type === 'pills' && <div style={{ display: 'flex', gap: 7, flexWrap: 'wrap', paddingLeft: 40, animation: 'fadeUp .25s ease' }}>
                {curStep.opts.map(opt => (
                  <button key={opt} onClick={() => sendAnswer(opt)}
                    style={{ padding: '8px 14px', borderRadius: 20, border: `1.5px solid ${C.borderS}`, background: C.surface, color: C.text, fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: C.sans, transition: 'all .15s' }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = col; e.currentTarget.style.color = col; e.currentTarget.style.background = col + '0D'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = C.borderS; e.currentTarget.style.color = C.text; e.currentTarget.style.background = C.surface; }}>
                    {opt}
                  </button>
                ))}
              </div>}

              {/* Built result action buttons */}
              {built && !building && !thinking && <div style={{ display: 'flex', gap: 8, paddingLeft: 40, flexWrap: 'wrap', animation: 'fadeUp .3s .1s ease both' }}>
                {type === 'playbook'
                  ? <><button onClick={() => { toast(`Starting "${built.title}"…`, null, 'success'); onClose(); }} style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '10px 20px', borderRadius: 10, background: col, border: 'none', cursor: 'pointer', color: '#fff', fontSize: 13, fontWeight: 700, fontFamily: C.heading }}>
                    <Icon name="play" size={14} color="#fff" /> Start Playbook
                  </button>
                    <button onClick={() => { toast(`"${built.title}" saved to your Playbooks!`, null, 'success'); onClose(); }} style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '10px 18px', borderRadius: 10, background: C.bg, border: `1.5px solid ${C.borderS}`, cursor: 'pointer', color: C.text, fontSize: 13, fontWeight: 500, fontFamily: C.sans }}>
                      <Icon name="download" size={14} /> Save to library
                    </button></>
                  : <><button onClick={() => { toast(`Launching "${built.name}"…`, null, 'success'); onClose(); }} style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '10px 20px', borderRadius: 10, background: col, border: 'none', cursor: 'pointer', color: '#fff', fontSize: 13, fontWeight: 700, fontFamily: C.heading }}>
                    <Icon name="play" size={14} color="#fff" /> Run Agent
                  </button>
                    <button onClick={() => { toast(`"${built.name}" saved to your Agents!`, null, 'success'); onClose(); }} style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '10px 18px', borderRadius: 10, background: C.bg, border: `1.5px solid ${C.borderS}`, cursor: 'pointer', color: C.text, fontSize: 13, fontWeight: 500, fontFamily: C.sans }}>
                      <Icon name="download" size={14} /> Save to library
                    </button></>
                }
              </div>}
            </div>

            {/* Input area — only for text-type steps */}
            {!built && <div style={{ padding: '12px 18px 16px', borderTop: `1px solid ${C.border}`, flexShrink: 0, background: C.surface }}>
              {isTextStep && !thinking && !building ? <div style={{ display: 'flex', gap: 9, alignItems: 'flex-end' }}>
                <textarea value={inputVal} onChange={e => setInputVal(e.target.value)} ref={inputRef}
                  placeholder={curStep?.placeholder || 'Type your answer…'} rows={2}
                  style={{ flex: 1, border: `1.5px solid ${C.borderS}`, borderRadius: 11, padding: '10px 13px', fontFamily: C.sans, fontSize: 13, color: C.text, background: C.bg, outline: 'none', resize: 'none', lineHeight: 1.6, transition: 'border-color .15s' }}
                  onFocus={e => e.target.style.borderColor = col} onBlur={e => e.target.style.borderColor = C.borderS}
                  onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAnswer(inputVal); } }} />
                <button onClick={() => sendAnswer(inputVal)} disabled={!inputVal.trim()}
                  style={{ width: 40, height: 40, borderRadius: 11, background: inputVal.trim() ? col : '#e5e5e5', border: 'none', cursor: inputVal.trim() ? 'pointer' : 'not-allowed', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'all .18s', boxShadow: inputVal.trim() ? `0 4px 14px ${col}40` : 'none' }}>
                  <Icon name="arrowUp" size={17} color={inputVal.trim() ? '#fff' : C.t4} />
                </button>
              </div>
                : <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '6px 12px', background: C.bg, borderRadius: 10, border: `1px solid ${C.border}` }}>
                  <Icon name={thinking || building ? 'sparkle' : 'chatCircle'} size={14} color={C.t4} />
                  <span style={{ fontSize: 12, color: C.t4, fontFamily: C.sans }}>
                    {thinking ? 'Building is thinking…' : building ? 'Generating your custom ' + type + '…' : 'Select an option above to continue'}
                  </span>
                </div>}
            </div>}
          </div>
        </div>
      </>;
    }

    function PlaybooksPage({ toast, deepLink, onClearDeepLink }) {
      const [filter, setFilter] = useState('All');
      const [view, setView] = useState('library');
      const [openPB, setOpenPB] = useState(null);
      const [activePB, setActivePB] = useState(null);
      const [completedPB, setCompletedPB] = useState(null);
      const [pbProgress, setPbProgress] = useLS('wt_pb_progress', {});
      const [showBuilder, setShowBuilder] = useState(false);
      const [searchVal, setSearchVal] = useState('');
      const [searchFocused, setSearchFocused] = useState(false);
      const searchRef = useRef();

      // Deep-link: auto-open specific playbook modal when navigated from search/home
      useEffect(() => {
        if (deepLink && deepLink.type === 'playbook' && deepLink.id) {
          const pb = PLAYBOOKS.find(p => p.id === deepLink.id);
          if (pb) { setOpenPB(pb); setView('library'); }
          if (onClearDeepLink) onClearDeepLink();
        }
      }, [deepLink]);

      const cats = ['All', 'Product', 'Marketing', 'Growth', 'Finance', 'Operations'];

      // Filter by both category and search
      const items = PLAYBOOKS.filter(p => {
        const matchCat = filter === 'All' || p.cat === filter;
        const q = searchVal.toLowerCase().trim();
        const matchSearch = !q || p.title.toLowerCase().includes(q) || p.outcome.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
        return matchCat && matchSearch;
      });

      const startPlaybook = pb => { setOpenPB(null); setActivePB(pb); setView('active'); };
      const finishPlaybook = pb => { setActivePB(null); setCompletedPB(pb); setView('complete'); };
      const backToLibrary = () => { setView('library'); setActivePB(null); setCompletedPB(null); };

      if (view === 'active' && activePB) return <PlaybookActiveView pb={activePB} onBack={backToLibrary} onComplete={finishPlaybook} toast={toast} />;
      if (view === 'complete' && completedPB) return <PlaybookCompleteView pb={completedPB} onBack={backToLibrary} onNext={pb => { setCompletedPB(null); startPlaybook(pb); }} toast={toast} />;

      return <div className="fu">
        {/* Header */}
        <div style={{ marginBottom: 18 }}>
          <h2 style={{ fontFamily: C.heading, fontSize: 24, fontWeight: 800, color: C.text, marginBottom: 3, letterSpacing: '-0.02em' }}>Playbooks</h2>
          <p style={{ fontSize: 13, color: C.t3, fontFamily: C.sans, lineHeight: 1.5 }}>Step-by-step execution systems with AI prompts built in. Pick one, follow the steps, get results.</p>
        </div>

        {/* Inline search bar */}
        <div style={{ position: 'relative', borderRadius: 13, padding: '2px', background: searchFocused ? `linear-gradient(135deg,${C.purple},${C.pink})` : 'transparent', boxShadow: searchFocused ? `0 0 0 4px ${C.purple}12` : 'none', transition: 'all .2s', marginBottom: 18 }}>
          <div style={{ background: C.surface, borderRadius: 11, border: searchFocused ? 'none' : `1.5px solid ${C.borderS}`, display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px' }}>
            <Icon name="magnifying" size={16} color={searchFocused ? C.purple : C.t3} />
            <input ref={searchRef} value={searchVal}
              onChange={e => setSearchVal(e.target.value)}
              onFocus={() => setSearchFocused(true)}
              onBlur={() => setSearchFocused(false)}
              placeholder="Search by name, outcome, category…"
              style={{ flex: 1, border: 'none', outline: 'none', fontFamily: C.sans, fontSize: 13, color: C.text, background: 'transparent' }} />
            {searchVal && <button onClick={() => { setSearchVal(''); searchRef.current?.focus(); }}
              style={{ width: 20, height: 20, borderRadius: '50%', background: C.bg, border: `1px solid ${C.border}`, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Icon name="x" size={10} color={C.t3} />
            </button>}
            <div style={{ fontSize: 11, color: C.t4, fontFamily: C.sans, flexShrink: 0 }}>{items.length} results</div>
          </div>
        </div>

        {/* Active Playbooks banner */}
        {PLAYBOOKS.filter(p => p.active).length > 0 && <div style={{ background: `linear-gradient(135deg,${C.purple}08,${C.pink}04)`, border: `1px solid ${C.purple}20`, borderRadius: 13, padding: '13px 18px', marginBottom: 18, display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ width: 36, height: 36, borderRadius: 9, background: C.purpleL, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name="play" size={16} color={C.purple} /></div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.text, fontFamily: C.sans }}>2 Playbooks in progress</div>
            <div style={{ fontSize: 12, color: C.t3, fontFamily: C.sans }}>MVP Builder (33%) · GTM Strategy (25%) — pick up where you left off</div>
          </div>
          <Btn size="sm" v="primary" onClick={() => startPlaybook(PLAYBOOKS[0])}>Resume →</Btn>
        </div>}

        {/* ── CATEGORY FILTER — full width ── */}
        <div style={{ display: 'flex', gap: 5, marginBottom: 22, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 13, padding: '5px', width: '100%' }}>
          {cats.map(cat => (
            <button key={cat} onClick={() => setFilter(cat)}
              style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '8px 10px', borderRadius: 9, fontSize: 13, fontWeight: filter === cat ? 600 : 400, color: filter === cat ? '#fff' : C.t2, background: filter === cat ? C.black : 'transparent', border: 'none', cursor: 'pointer', fontFamily: C.sans, transition: 'all .15s', whiteSpace: 'nowrap' }}>
              {cat}
            </button>
          ))}
        </div>

        {/* Search result count */}
        {(searchVal || filter !== 'All') && <div style={{ marginBottom: 14, display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 13, color: C.t3, fontFamily: C.sans }}>
            {items.length} {items.length === 1 ? 'playbook' : 'playbooks'}
            {searchVal && <> matching "<strong style={{ color: C.text }}>{searchVal}</strong>"</>}
            {filter !== 'All' && <> in <strong style={{ color: C.text }}>{filter}</strong></>}
          </span>
          {(searchVal || filter !== 'All') && <button onClick={() => { setSearchVal(''); setFilter('All'); }} style={{ fontSize: 11, color: C.purple, background: 'none', border: 'none', cursor: 'pointer', fontFamily: C.sans, fontWeight: 600 }}>Clear ×</button>}
        </div>}

        {/* ── GRID: custom "Build with AI" card first, then playbooks ── */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 14 }}>

          {/* Custom Playbook card — dark, in-grid */}
          <div onClick={() => setShowBuilder(true)}
            style={{ background: `linear-gradient(145deg,${C.black} 0%,#1B0A35 100%)`, borderRadius: 14, padding: '20px 18px', cursor: 'pointer', transition: 'all .2s', border: '1.5px solid rgba(99,55,171,.18)', position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', minHeight: 180 }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = `0 12px 36px ${C.purple}30`; e.currentTarget.style.borderColor = 'rgba(99,55,171,.45)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = 'none'; e.currentTarget.style.borderColor = 'rgba(99,55,171,.18)'; }}>
            <div style={{ position: 'absolute', top: -24, right: -24, width: 100, height: 100, borderRadius: '50%', background: `radial-gradient(${C.purple}40,transparent 70%)`, pointerEvents: 'none' }} />
            <div style={{ position: 'relative' }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, background: `linear-gradient(135deg,${C.purple},${C.pink})`, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 12 }}>
                <Icon name="sparkle" size={18} color="#fff" />
              </div>
              <div style={{ fontSize: 14, fontWeight: 800, color: '#fff', marginBottom: 5, fontFamily: C.heading, lineHeight: 1.3 }}>Build a custom Playbook</div>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,.45)', lineHeight: 1.6, marginBottom: 14, fontFamily: C.sans }}>Chat with AI to create one tailored to your exact goal and timeline.</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                {['Your goal', 'Your timeline', 'Custom prompts'].map(t => (
                  <span key={t} style={{ fontSize: 9, fontWeight: 600, padding: '2px 8px', borderRadius: 20, background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.55)', fontFamily: C.sans }}>{t}</span>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12, fontWeight: 700, color: C.pink, fontFamily: C.heading, marginTop: 14, position: 'relative' }}>
              <Icon name="sparkle" size={11} color={C.pink} /> Start building →
            </div>
          </div>

          {items.map(pb => <PBCard key={pb.id} pb={pb} toast={toast} onOpen={setOpenPB} onStart={startPlaybook} />)}
        </div>
        {items.length === 0 && <PlaybookEmpty filter={filter} searchVal={searchVal} onClear={() => { setSearchVal(''); setFilter('All'); }} />}

        {/* Preview modal */}
        {openPB && <PBModal pb={openPB} onClose={() => setOpenPB(null)} onStart={startPlaybook} toast={toast} />}

        {/* AI Builder modal */}
        {showBuilder && <AIBuilderModal type="playbook" onClose={() => setShowBuilder(false)} toast={toast} />}
      </div>;
    }

    function PBCard({ pb, toast, onOpen, onStart }) {
      const [h, setH] = useState(false);
      const steps = pb.steps || pb.phases;
      const pct = Math.round((pb.done / steps) * 100);
      const isActive = pb.done > 0;
      return <div onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} onClick={() => onOpen(pb)}
        style={{ background: C.surface, borderRadius: 14, border: `1px solid ${h ? pb.col + '40' : C.border}`, cursor: 'pointer', transition: 'all .18s', boxShadow: h ? `0 6px 24px ${pb.col}12` : 'none', transform: h ? 'translateY(-2px)' : 'none', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Top accent line — thin, coloured if active */}
        <div style={{ height: 2, background: isActive ? pb.col : C.border, flexShrink: 0 }} />

        <div style={{ padding: '16px 18px', flex: 1, display: 'flex', flexDirection: 'column', gap: 0 }}>
          {/* Row 1: Tag + status */}

              style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '7px 16px', borderRadius: 8, background: isActive ? pb.col : C.bg, border: `1.5px solid ${isActive ? pb.col : C.borderS}`, color: isActive ? '#fff' : C.t2, fontSize: 12, fontWeight: 600, fontFamily: C.sans, cursor: 'pointer', transition: 'all .15s' }}

              onMouseLeave={e => { if (!isActive) { e.currentTarget.style.borderColor = C.borderS; e.currentTarget.style.color = C.t2; } }}>
              {isActive ? 'Continue →' : 'Start →'}
            </button>
          </div>
        </div>
      </div>;
    }

    function PlaybookEmpty({ filter, searchVal, onClear }) {

                <div style={{ flex: 1 }}>

              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 8, marginBottom: 0 }}>

                    <div style={{ fontSize: 9, color: C.t3, marginTop: 2, fontFamily: C.sans, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{l}</div>

              <div style={{ display: 'flex', gap: 0, marginTop: 14 }}>

    /* ─── ACTIVE PLAYBOOK VIEW ────────────────────── */
    function PlaybookActiveView({ pb, onBack, onComplete, toast }) {
      const rawSteps = PB_PHASES[pb.id];
      const steps = rawSteps || Array.from({ length: (pb.steps || pb.phases) }, (_, i) => ({
        num: i + 1, title: ['Validate', 'Scope', 'Build', 'Test', 'Launch', 'Grow'][i] || `Step ${i + 1}`,
        sub: 'Work through this step with AI assistance', reading: '',
        prompts: [
          { num: '01', text: 'Work through this step with AI assistance. Describe your current situation and what you need to accomplish.', useWhen: 'Starting this step' },
          { num: '02', text: 'Review what you\'ve done so far in this step and identify any gaps or blockers you need to address.', useWhen: 'Mid-step review' },
          { num: '03', text: 'Summarise the outputs from this step. What did you decide, create, or validate?', useWhen: 'Completing this step' },
        ],
        done: i < pb.done, active: i === pb.done
      }));

      // Persist step progress per playbook
      const progressKey = `wt_pb_step_${pb.id}`;
      const notesKey = `wt_pb_notes_${pb.id}`;
      const doneKey = `wt_pb_done_${pb.id}`;

      const [currentIdx, setCurrentIdx] = useState(() => {
        try { const saved = localStorage.getItem(progressKey); return saved !== null ? parseInt(saved) : Math.max(0, steps.findIndex(p => p.active)); }
        catch { return Math.max(0, steps.findIndex(p => p.active)); }
      });
      const [doneSteps, setDoneSteps] = useState(() => {
        try { const saved = localStorage.getItem(doneKey); return saved ? JSON.parse(saved) : steps.map(s => s.done); }
        catch { return steps.map(s => s.done); }
      });
      const [activeTab, setActiveTab] = useState('prompts');
      const [notes, setNotes] = useState(() => {
        try { const saved = localStorage.getItem(notesKey); return saved ? JSON.parse(saved) : {}; } catch { return {}; }
      });
      const [copied, setCopied] = useState(null);
      const [showComplete, setShowComplete] = useState(false);

      // Persist step index whenever it changes
      useEffect(() => { try { localStorage.setItem(progressKey, String(currentIdx)); } catch { }; }, [currentIdx, progressKey]);
      // Persist notes whenever they change
      useEffect(() => { try { localStorage.setItem(notesKey, JSON.stringify(notes)); } catch { }; }, [notes, notesKey]);
      // Persist done steps
      useEffect(() => { try { localStorage.setItem(doneKey, JSON.stringify(doneSteps)); } catch { }; }, [doneSteps, doneKey]);

      const stepsWithDone = stepsWithDone.map((s, i) => ({ ...s, done: doneSteps[i] || false, active: i === currentIdx }));
      const cur = stepsWithDone[currentIdx];
      const doneCount = doneSteps.filter(Boolean).length;
      const pct = Math.round((doneCount / stepsWithDone.length) * 100);
      const hasReading = cur && cur.reading && cur.reading.length > 0;
      const hasStructuredPrompts = cur && Array.isArray(cur.prompts) && cur.prompts.length > 0 && typeof cur.prompts[0] === 'object';

      const copyPrompt = (text, idx) => {
        navigator.clipboard?.writeText(text).catch(() => { });
        setCopied(idx); setTimeout(() => setCopied(null), 2200);
        toast('Prompt copied to clipboard!', null, 'success');
      };

      const usePrompt = (text) => {
        toast('Opening AI Strategist with this prompt…', null, 'success');
      };

      const markDone = () => {
        const newDone = [...doneSteps];
        newDone[currentIdx] = true;
        setDoneSteps(newDone);
        if (currentIdx < stepsWithDone.length - 1) {
          setShowComplete(true);
          setTimeout(() => {
            setShowComplete(false);
            setCurrentIdx(currentIdx + 1);
            setActiveTab('prompts');
            toast(`Step ${cur.num} complete! 🎉`, null, 'success');
          }, 2000);
        } else {
          setTimeout(() => onComplete(pb), 400);
        }
      };

      return <div style={{ maxWidth: 1020, margin: '0 auto' }}>

        {/* ── TOP BAR ── */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20, paddingTop: 4 }}>
          <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'none', border: 'none', cursor: 'pointer', fontSize: 13, color: C.t3, fontFamily: C.sans, padding: '6px 0', flexShrink: 0, transition: 'color .15s' }}
            onMouseEnter={e => e.currentTarget.style.color = C.text}
            onMouseLeave={e => e.currentTarget.style.color = C.t3}>
            <Icon name="arrowLeft" size={14} /> Back to Playbooks
          </button>
          <div style={{ flex: 1, textAlign: 'center' }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: C.text, fontFamily: C.heading }}>{pb.title} Playbook</span>
          </div>
          <span style={{ fontSize: 13, fontWeight: 700, color: pb.col, fontFamily: C.mono, flexShrink: 0 }}>{pct}% done</span>
        </div>

        {/* ── SLIM PROGRESS BAR ── */}
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: '12px 18px', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 16 }}>
          <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.07em', color: C.t4, textTransform: 'uppercase', fontFamily: C.sans, flexShrink: 0 }}>Overall Progress</span>
          <div style={{ flex: 1 }}>
            <ProgressBar val={doneCount} max={stepsWithDone.length} col={pb.col} h={5} />
          </div>
          <span style={{ fontSize: 12, fontWeight: 700, color: pb.col, fontFamily: C.mono, flexShrink: 0 }}>{doneCount}/{stepsWithDone.length} steps</span>
        </div>

        {/* ── HORIZONTAL STEP NAV ── */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 18, overflowX: 'auto', paddingBottom: 2 }}>
          {stepsWithDone.map((s, i) => (
            <button key={s.num} onClick={() => { setCurrentIdx(i); setActiveTab('prompts'); }}
              style={{ flex: '1 0 auto', minWidth: 72, padding: '9px 8px', borderRadius: 9, border: `1.5px solid ${i === currentIdx ? pb.col : s.done ? C.green + '50' : C.border}`, background: i === currentIdx ? pb.col + '12' : s.done ? C.greenBg : 'transparent', cursor: 'pointer', transition: 'all .15s', fontFamily: C.sans, textAlign: 'center' }}
              onMouseEnter={e => { if (i !== currentIdx) e.currentTarget.style.borderColor = pb.col + '40'; }}
              onMouseLeave={e => { if (i !== currentIdx) e.currentTarget.style.borderColor = s.done ? C.green + '50' : C.border; }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: i === currentIdx ? pb.col : s.done ? C.green : C.t4, marginBottom: 2, fontFamily: C.mono }}>S{s.num}</div>
              <div style={{ fontSize: 9, color: i === currentIdx ? pb.col : s.done ? C.green : C.t3, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', lineHeight: 1.3 }}>{s.title}</div>
              {s.done && <div style={{ fontSize: 8, color: C.green, marginTop: 2 }}>✓</div>}
            </button>
          ))}
        </div>

        {/* ── STEP COMPLETE CELEBRATION ── */}
        {showComplete && <div style={{ background: `linear-gradient(135deg,${pb.col},${C.pink})`, borderRadius: 14, padding: '20px 24px', marginBottom: 18, textAlign: 'center', animation: 'scaleIn .3s ease' }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>🎉</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: '#fff', fontFamily: C.heading }}>Step {cur.num} Complete!</div>
          <div style={{ fontSize: 12, color: 'rgba(255,255,255,.8)', marginTop: 4, fontFamily: C.sans }}>Great work — moving to the next step…</div>
        </div>}

        {/* ── MAIN LAYOUT ── */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: 16, alignItems: 'start' }}>

          {/* ── LEFT PANEL ── */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>

            {/* Step header */}
            <div style={{ background: `linear-gradient(135deg,${pb.col} 0%,${pb.col}CC 100%)`, borderRadius: '14px 14px 0 0', padding: '18px 22px' }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.09em', textTransform: 'uppercase', color: 'rgba(255,255,255,.6)', marginBottom: 6, fontFamily: C.sans }}>Step {cur.num} of {stepsWithDone.length}</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: '#fff', fontFamily: C.heading, lineHeight: 1.2, marginBottom: 6 }}>{cur.title}</div>
              <div style={{ fontSize: 13, color: 'rgba(255,255,255,.75)', fontFamily: C.sans, lineHeight: 1.5 }}>{cur.sub}</div>
            </div>

            {/* Tab bar */}
            <div style={{ background: C.surface, borderLeft: `1.5px solid ${pb.col}30`, borderRight: `1.5px solid ${pb.col}30`, display: 'flex', gap: 0, borderBottom: `1px solid ${C.border}` }}>
              {[
                { id: 'prompts', label: 'AI Prompts', icon: 'sparkle', count: Array.isArray(cur.prompts) ? cur.prompts.length : 0 },
                ...(hasReading ? [{ id: 'read', label: 'Content', icon: 'bookOpen' }] : []),
                { id: 'notes', label: 'My Notes', icon: 'pencil' },
              ].map(t => (
                <button key={t.id} onClick={() => setActiveTab(t.id)}
                  style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '12px 18px', background: 'transparent', border: 'none', borderBottom: `2.5px solid ${activeTab === t.id ? pb.col : 'transparent'}`, cursor: 'pointer', fontSize: 13, fontWeight: activeTab === t.id ? 700 : 400, color: activeTab === t.id ? pb.col : C.t3, fontFamily: C.sans, transition: 'all .15s', whiteSpace: 'nowrap' }}>
                  <Icon name={t.icon} size={13} color="currentColor" />
                  {t.label}
                  {t.count > 0 && <span style={{ fontSize: 10, fontWeight: 700, background: activeTab === t.id ? pb.col : C.bg, color: activeTab === t.id ? '#fff' : C.t3, padding: '1px 6px', borderRadius: 20, fontFamily: C.mono, marginLeft: 2 }}>{t.count}</span>}
                </button>
              ))}
            </div>

            {/* Tab content */}
            <div style={{ background: C.surface, border: `1.5px solid ${pb.col}30`, borderTop: 'none', borderRadius: '0 0 14px 14px', minHeight: 300 }}>

              {/* PROMPTS TAB */}
              {activeTab === 'prompts' && <div style={{ padding: '18px 20px' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: C.t3, textTransform: 'uppercase', letterSpacing: '0.07em', fontFamily: C.sans }}>AI Prompts for this step</div>
                    <div style={{ fontSize: 11, color: C.t4, fontFamily: C.sans, marginTop: 2 }}>Copy any prompt → paste into Claude, ChatGPT, or any AI tool</div>
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 600, background: pb.col + '14', color: pb.col, padding: '3px 10px', borderRadius: 20, fontFamily: C.mono, flexShrink: 0 }}>
                    {cur && Array.isArray(cur.prompts) ? cur.prompts.length : 0} prompts
                  </span>
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  {(cur && Array.isArray(cur.prompts) ? cur.prompts : []).map((p, i) => {
                    const promptText = typeof p === 'object' ? p.text : p;
                    const promptNum = typeof p === 'object' ? p.num : `0${i + 1}`;
                    const useWhen = typeof p === 'object' ? p.useWhen : null;
                    const isCopied = copied === i;
                    return <div key={i}
                      style={{ background: C.bg, border: `1.5px solid ${isCopied ? C.green : C.border}`, borderRadius: 12, overflow: 'hidden', transition: 'border-color .2s' }}
                      onMouseEnter={e => { if (!isCopied) e.currentTarget.style.borderColor = pb.col + '50'; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = isCopied ? C.green : C.border; }}>
                      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: '14px 16px 10px' }}>
                        <div style={{ width: 28, height: 28, borderRadius: 8, background: pb.col + '18', border: `1.5px solid ${pb.col}30`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>
                          <span style={{ fontSize: 10, fontWeight: 800, color: pb.col, fontFamily: C.mono }}>{promptNum}</span>
                        </div>
                        <div style={{ flex: 1, fontSize: 13, color: C.text, lineHeight: 1.65, fontFamily: C.sans }}>{promptText}</div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 16px 12px', borderTop: `1px solid ${C.border}` }}>
                        {useWhen ? <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                          <Icon name="lightning" size={11} color={C.t4} />
                          <span style={{ fontSize: 11, color: C.t4, fontFamily: C.sans, fontStyle: 'italic' }}>Use when: {useWhen.toLowerCase()}</span>
                        </div> : <div />}
                        <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                          <button onClick={() => usePrompt(promptText)}
                            style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '5px 12px', borderRadius: 7, background: pb.col, border: 'none', cursor: 'pointer', color: '#fff', fontSize: 11, fontWeight: 600, fontFamily: C.sans, transition: 'opacity .15s' }}

                            <Icon name="sparkle" size={10} color="#fff" /> Use
                          </button>

                            <Icon name={isCopied ? 'check' : 'copy'} size={10} color="currentColor" />

                          </button>
                        </div>
                      </div>
                    </div>;
                  })}
                </div>
              </div>}

              {/* READ TAB */}
              {activeTab === 'read' && hasReading && <div style={{ padding: '22px 24px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 18, paddingBottom: 14, borderBottom: `1px solid ${C.border}` }}>
                  <div style={{ width: 32, height: 32, borderRadius: 8, background: pb.col + '14', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <Icon name="bookOpen" size={15} color={pb.col} />
                  </div>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.text, fontFamily: C.heading }}>Section {cur.num}: {cur.title}</div>

                  </div>
                </div>
                {cur.reading.split('\n\n').map((para, i) => {
                  if (para.startsWith('•') || para.includes('\n•')) {
                    const items = para.split('\n').filter(l => l.trim());
                    return <div key={i} style={{ marginBottom: 16 }}>
                      {items.map((item, j) => {
                        const isBullet = item.startsWith('•');
                        const isHeader = !isBullet && j === 0 && item.endsWith(':');
                        return <div key={j} style={{ display: 'flex', gap: 10, marginBottom: isBullet ? 8 : 4, fontFamily: C.sans, fontSize: isHeader ? 12 : 13, fontWeight: isHeader ? 700 : 400, color: isHeader ? C.t3 : C.text, textTransform: isHeader ? 'uppercase' : 'none', letterSpacing: isHeader ? '0.06em' : '0', lineHeight: 1.65 }}>

                        </div>;
                      })}
                    </div>;
                  }
                  const isCallout = para.startsWith('THE ') || para.startsWith('STEP ') || para.startsWith('MORNING') || para.startsWith('AFTERNOON') || para.startsWith('WEEKLY') || para.startsWith('MONTHLY');
                  if (isCallout) {
                    return <div key={i} style={{ background: pb.col + '08', border: `1.5px solid ${pb.col}20`, borderLeft: `3px solid ${pb.col}`, borderRadius: '0 10px 10px 0', padding: '12px 16px', marginBottom: 16 }}>
                      {para.split('\n').map((line, j) => (
                        <div key={j} style={{ fontSize: 12, color: j === 0 ? pb.col : C.t2, fontFamily: j === 0 ? C.heading : C.sans, fontWeight: j === 0 ? 700 : 400, lineHeight: 1.65, marginBottom: j === 0 ? 6 : 0 }}>{line}</div>

              {/* NOTES TAB */}
              {activeTab === 'notes' && <div style={{ padding: '18px 20px' }}>

                  style={{ width: '100%', minHeight: 220, border: `1.5px solid ${C.borderS}`, borderRadius: 10, padding: '13px 15px', fontFamily: C.sans, fontSize: 13, color: C.text, background: C.bg, outline: 'none', resize: 'vertical', lineHeight: 1.7, boxSizing: 'border-box' }}

                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 10 }}>
                  <span style={{ fontSize: 11, color: C.t4, fontFamily: C.sans }}>Auto-saved to Results Vault on step completion</span>
                  <button onClick={() => toast('Notes saved!', null, 'success')}

            {/* Step navigation */}
            <div style={{ display: 'flex', gap: 8, marginTop: 14, alignItems: 'center' }}>

              <div style={{ padding: '12px 15px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>

                {(cur && Array.isArray(cur.prompts) ? cur.prompts : []).map((p, i) => {

                  const text = typeof p === 'object' ? p.text : p;

                  const isCopied = copied === i;
                  return <button key={i}
                    onClick={() => {
                      // Scroll to that prompt in the prompts tab
                      setActiveTab('prompts');
                      copyPrompt(text, i);

                    style={{ width: '100%', display: 'flex', alignItems: 'flex-start', gap: 9, padding: '8px 8px', borderRadius: 8, background: isCopied ? C.green + '08' : 'transparent', border: 'none', cursor: 'pointer', marginBottom: 1, textAlign: 'left', transition: 'background .12s' }}

                    onMouseLeave={e => e.currentTarget.style.background = isCopied ? C.green + '08' : 'transparent'}>
                    <span style={{ fontSize: 9, fontWeight: 800, color: isCopied ? C.green : pb.col, fontFamily: C.mono, background: isCopied ? C.green + '14' : pb.col + '12', padding: '2px 6px', borderRadius: 5, flexShrink: 0, marginTop: 1 }}>{num}</span>
                    <span style={{ fontSize: 11, color: isCopied ? C.green : C.t2, fontFamily: C.sans, lineHeight: 1.45, flex: 1 }}>{short}</span>
                    {isCopied && <Icon name="check" size={11} color={C.green} />}
                  </button>;
                })}
              </div>
              {/* Divider + all steps jump */}
              <div style={{ borderTop: `1px solid ${C.border}`, padding: '8px 10px' }}>
                <div style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: C.t4, marginBottom: 6, fontFamily: C.sans, paddingLeft: 4 }}>Jump to Step</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
                  {stepsWithDone.map((s, i) => (
                    <button key={s.num} onClick={() => { setCurrentIdx(i); setActiveTab('prompts'); }}
                      style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 8, padding: '6px 8px', borderRadius: 7, background: i === currentIdx ? pb.col + '10' : 'transparent', border: 'none', cursor: 'pointer', transition: 'background .12s', textAlign: 'left' }}
                      onMouseEnter={e => { if (i !== currentIdx) e.currentTarget.style.background = C.bg; }}
                      onMouseLeave={e => { e.currentTarget.style.background = i === currentIdx ? pb.col + '10' : 'transparent'; }}>
                      <div style={{ width: 18, height: 18, borderRadius: 5, background: s.done ? C.green : i === currentIdx ? pb.col : C.border, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'all .15s' }}>
                        {s.done ? <Icon name="check" size={9} color="#fff" /> : <span style={{ fontSize: 8, fontWeight: 700, color: i === currentIdx ? '#fff' : C.t4, fontFamily: C.mono }}>{s.num}</span>}
                      </div>
                      <span style={{ fontSize: 11, color: i === currentIdx ? pb.col : s.done ? C.green : C.t3, fontWeight: i === currentIdx ? 700 : 400, fontFamily: C.sans, flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.title}</span>
                      {i === currentIdx && <div style={{ width: 4, height: 4, borderRadius: '50%', background: pb.col, flexShrink: 0 }} />}
                    </button>
                  ))}
                </div>
                <div style={{ height: 3, background: C.border, borderRadius: 2, marginTop: 8, overflow: 'hidden' }}>
                  <div style={{ height: '100%', background: pb.col, borderRadius: 2, width: `${pct}%`, transition: 'width .4s' }} />
                </div>
                <div style={{ fontSize: 9, color: C.t4, fontFamily: C.sans, marginTop: 4, textAlign: 'right' }}>{doneCount}/{stepsWithDone.length} complete · {pct}%</div>
              </div>
            </div>

            {/* 2. Mark step done */}
            <button onClick={markDone}
              style={{ width: '100%', padding: '14px', background: `linear-gradient(135deg,${pb.col},${pb.col}CC)`, border: 'none', borderRadius: 13, cursor: 'pointer', color: '#fff', fontSize: 14, fontWeight: 700, fontFamily: C.heading, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9, boxShadow: `0 6px 24px ${pb.col}35`, transition: 'all .2s' }}
              onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = `0 10px 32px ${pb.col}50`; }}
              onMouseLeave={e => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = `0 6px 24px ${pb.col}35`; }}>

            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 13, padding: '12px 14px', cursor: 'pointer', transition: 'all .15s' }}

            {/* 4. Linked toolkit + Reward row */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <div style={{ background: C.purpleL, border: `1px solid ${C.purple}20`, borderRadius: 12, padding: '11px 12px', cursor: 'pointer', transition: 'all .15s' }}
                onClick={() => toast('Opening Toolkit…')}
                onMouseEnter={e => e.currentTarget.style.borderColor = `${C.purple}40`}
                onMouseLeave={e => e.currentTarget.style.borderColor = `${C.purple}20`}>
                <div style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: C.purple, marginBottom: 4, fontFamily: C.sans }}>Toolkit</div>
                <div style={{ fontSize: 11, fontWeight: 600, color: C.text, marginBottom: 6, fontFamily: C.sans, lineHeight: 1.3 }}>{pb.id === 9 ? 'Lead Gen Swipe File' : 'MVP Builder Toolkit'}</div>
                <div style={{ fontSize: 10, color: C.t3, fontFamily: C.sans, marginBottom: 8 }}>7 assets</div>
                <Btn size="xs" v="purple" onClick={e => { e.stopPropagation(); toast('Opening toolkit…'); }}><Icon name="download" size={10} /> Get</Btn>
              </div>
              <div style={{ background: C.amber + '10', border: `1px solid ${C.amber}25`, borderRadius: 12, padding: '11px 12px' }}>
                <div style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: C.amber, marginBottom: 4, fontFamily: C.sans }}>Reward</div>
                <div style={{ fontSize: 24, marginBottom: 2 }}>{pb.reward.split(' ')[0]}</div>
                <div style={{ fontSize: 10, fontWeight: 600, color: C.text, fontFamily: C.sans, lineHeight: 1.3 }}>{pb.reward.split(' ').slice(1).join(' ')}</div>
                <div style={{ fontSize: 10, color: C.t3, fontFamily: C.sans, marginTop: 4 }}>{stepsWithDone.length - doneCount} steps left</div>
              </div>
            </div>
          </div>
        </div>
      </div>;
    }

    /* ─── PLAYBOOK COMPLETE SCREEN ────────────────── */
    function PlaybookCompleteView({ pb, onBack, onNext, toast }) {
      const nextPB = PLAYBOOKS.find(p => p.id !== pb.id && !p.active);
      return <div className="fu" style={{ maxWidth: 600, margin: '0 auto', textAlign: 'center', paddingTop: 20 }}>
        <div style={{ width: 80, height: 80, borderRadius: 20, background: `linear-gradient(135deg,${pb.col},${C.pink})`, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px', boxShadow: `0 8px 32px ${pb.col}40`, animation: 'breathe 2s ease infinite' }}><span style={{ fontSize: 36 }}>🏆</span></div>
        <h1 style={{ fontFamily: C.heading, fontSize: 30, fontWeight: 800, color: C.text, marginBottom: 8, letterSpacing: '-0.02em' }}>{pb.title} Complete!</h1>
        <p style={{ fontSize: 14, color: C.t3, marginBottom: 8, fontFamily: C.sans }}>You've earned the <strong style={{ color: pb.col }}>{pb.reward}</strong></p>
        <p style={{ fontSize: 13, color: C.t3, marginBottom: 32, fontFamily: C.sans, lineHeight: 1.6 }}>All outputs have been saved to your Results Vault. Your progress has been logged to your profile.</p>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 10, marginBottom: 28 }}>
          {[[(pb.steps || pb.phases) + '', 'Steps completed'], [pb.prompts + '', 'AI Prompts used'], ['Vault', 'Outputs saved']].map(([v, l]) => (
            <div key={l} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: '14px' }}>
              <div style={{ fontFamily: C.mono, fontSize: 22, fontWeight: 800, color: C.text, lineHeight: 1 }}>{v}</div>
              <div style={{ fontSize: 11, color: C.t3, marginTop: 4, fontFamily: C.sans }}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'center', flexWrap: 'wrap' }}>
          <Btn v="primary" onClick={() => toast('Exporting outputs to Results Vault…', null, 'success')}><Icon name="download" size={14} color="#fff" /> Export Outputs</Btn>
          {nextPB && <Btn v="outline" onClick={() => onNext(nextPB)}>Start {nextPB.title} →</Btn>}
          <Btn v="ghost" onClick={onBack}>Back to Playbooks</Btn>
        </div>
      </div>;
    }

  <script type="text/babel" data-presets="react">

       AI AGENTS — Full Journey Implementation
       States: idle → setup → running → results → chain
       ═══════════════════════════════════════════════ */

    const AGENT_CHAIN = { 1: 3, 2: null, 3: 4, 4: 3, 5: 1, 6: 3 }; // agent id → recommended next agent id
    const CHAIN_MSG = { 1: 'Run Cold Outreach Agent on your 847 leads', 3: 'Analyse competitors of these new leads', 4: 'Write SEO content targeting these keywords', 5: 'Get Warm Intros to investors with your validated story' };

    function AgentsPage({ toast, onTab }) {
      const [filter, setFilter] = useState('All');
      const [view, setView] = useState('library');
      const [setupAgent, setSetupAgent] = useState(null);
      const [runningAgent, setRunningAgent] = useState(null);
      const [resultAgent, setResultAgent] = useState(null);
      const [inputs, setInputs] = useState({});
      const [progress, setProgress] = useState(0);
      const [credits, setCredits] = useLS('wt_credits', { used: 14, total: 20 });
      const [showBuilder, setShowBuilder] = useState(false);
      const cats = ['All', 'Growth', 'Marketing', 'Research', 'Fundraising'];
      const items = filter === 'All' ? AGENTS : AGENTS.filter(a => a.cat === filter);
      const canRun = ag => credits.used + ag.credits <= credits.total;

      const openSetup = ag => {
        if (!canRun(ag)) { toast('Not enough growth actions. Upgrade your plan.', null, 'warning'); return; }
        setSetupAgent(ag); setInputs({}); setView('setup');
      };
      const confirmRun = () => {
        setCredits(c => ({ ...c, used: c.used + setupAgent.credits }));
        setRunningAgent(setupAgent); setSetupAgent(null); setView('running'); setProgress(0);
        const interval = setInterval(() => setProgress(p => { if (p >= 100) { clearInterval(interval); setTimeout(() => { setResultAgent(runningAgent || setupAgent); setView('results'); toast(`${setupAgent?.shortName || 'Agent'} complete!`, 'View results', 'success'); }, 400); return 100; } return p + 2; }), 200);
      };
      const backToLibrary = () => { setView('library'); setSetupAgent(null); setRunningAgent(null); setResultAgent(null); setProgress(0); };
      const chainNext = ag => { const next = AGENTS.find(a => a.id === AGENT_CHAIN[ag.id]); if (next) { setResultAgent(null); openSetup(next); } };

      if (view === 'setup' && setupAgent) return <AgentSetupView agent={setupAgent} inputs={inputs} setInputs={setInputs} credits={credits} onConfirm={confirmRun} onBack={backToLibrary} toast={toast} />;
      if (view === 'running' && runningAgent) return <AgentRunningView agent={runningAgent} progress={progress} />;
      if (view === 'results' && resultAgent) return <AgentResultsView agent={resultAgent} onBack={backToLibrary} onChain={chainNext} onExport={() => { toast('Exporting to CSV…', null, 'success'); }} onVault={() => { toast('Saved to Results Vault!', null, 'success'); onTab('vault'); }} toast={toast} />;

      return <div className="fu">

          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
            {/* Build with AI button */}

              style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '11px 20px', background: `linear-gradient(135deg,${C.black},#2a1040)`, border: 'none', borderRadius: 12, cursor: 'pointer', color: '#fff', fontSize: 13, fontWeight: 700, fontFamily: C.heading, whiteSpace: 'nowrap', boxShadow: '0 4px 20px rgba(0,0,0,.25)', transition: 'all .2s' }}
              onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = `0 8px 28px ${C.purple}50`; }}
              onMouseLeave={e => { e.currentTarget.style.transform = 'none'; e.currentTarget.style.boxShadow = '0 4px 20px rgba(0,0,0,.25)'; }}>
              <Icon name="sparkle" size={16} color={C.pink} />
              Build with AI
            </button>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontFamily: C.mono, fontSize: 16, fontWeight: 800, color: credits.total - credits.used <= 4 ? C.red : C.text }}>{credits.total - credits.used}</div>
              <div style={{ fontSize: 11, color: C.t3, fontFamily: C.sans }}>actions left</div>
              <div style={{ marginTop: 4 }}><Btn size="xs" v="primary" onClick={() => toast('Opening upgrade…')}><Icon name="lightning" size={11} color="#fff" /> Get more</Btn></div>
            </div>
          </div>
        </div>

        {/* Credits bar */}
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: '12px 16px', marginBottom: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 7 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: C.t3, fontFamily: C.sans }}>Growth Actions this month</span>
            <span style={{ fontSize: 12, fontFamily: C.mono, fontWeight: 600, color: C.text }}>{credits.used} / {credits.total} used</span>

          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: 'rgba(255,255,255,.5)', letterSpacing: '0.07em', textTransform: 'uppercase', marginBottom: 4, fontFamily: C.sans }}>💡 Pro tip</div>

              <div style={{ width: 44, height: 44, borderRadius: 12, background: `linear-gradient(135deg,${C.purple},${C.pink})`, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 14, boxShadow: `0 4px 16px ${C.purple}50` }}>
                <Icon name="sparkle" size={22} color="#fff" />
