              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: 10, padding: 24 }}>
                {PLANS.map(p => (
                  <div key={p.name} onClick={() => { onUpdate({ ...user, plan: p.name }); setModal(false); toast(`Switched to ${p.name} Plan!`, null, 'success'); }} style={{ border: `1.5px solid ${user.plan === p.name ? p.col : C.border}`, borderRadius: 12, padding: '16px 12px', cursor: 'pointer', background: user.plan === p.name ? p.col + '07' : C.surface, transition: 'all .15s', position: 'relative' }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: p.col, marginBottom: 3, fontFamily: C.heading }}>{p.name}</div>
                    <div style={{ fontSize: 12, fontWeight: 600, color: C.text, marginBottom: 10, fontFamily: C.sans }}>{p.price}</div>
                    {p.features.map(f => <div key={f} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: C.t2, marginBottom: 3, fontFamily: C.sans }}><Icon name="check" size={11} color={p.col} /> {f}</div>)}
                  </div>
                ))}
              </div>
              <div style={{ padding: '0 24px 20px' }}><Btn v="ghost" onClick={() => setModal(false)} full>Close</Btn></div>
            </div>
          </div>
        </>}
      </div>;
    }

    /* ─── SETTINGS PAGE (no Appearance section) ─────── */
    const SECS = [{ id: 'account', icon: 'user', label: 'Account' }, { id: 'notifications', icon: 'bell', label: 'Notifications' }, { id: 'billing', icon: 'creditCard', label: 'Billing' }, { id: 'privacy', icon: 'shield', label: 'Privacy & Security' }, { id: 'integrations', icon: 'code', label: 'Integrations' }];
    function SettingsPage({ user, toast }) {
      const [sec, setSec] = useState('account');
      const [notifs, setNotifs] = useState({ email: true, browser: false, weekly: true, agentComplete: true, newPlaybook: true });
      function Row({ label, sub, children }) { return <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 0', borderBottom: `1px solid ${C.border}` }}><div style={{ flex: 1, marginRight: 24 }}><div style={{ fontSize: 13, fontWeight: 500, color: C.text }}>{label}</div>{sub && <div style={{ fontSize: 12, color: C.t3, marginTop: 2, lineHeight: 1.4 }}>{sub}</div>}</div>{children}</div>; }
      const content = {
        account: <Card>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 16 }}>Account Settings</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <Input label="Display name" value={user.name} onChange={() => { }} />
            <Input label="Email address" value={user.email || ''} onChange={() => { }} type="email" />
            <Input label="Company" value={user.company || ''} onChange={() => { }} />
            <Input label="Website" value="" onChange={() => { }} placeholder="https://yourcompany.com" />
            <Btn v="primary" size="sm" onClick={() => toast('Account updated!', null, 'success')} style={{ width: 'fit-content' }}><Icon name="check" size={13} color="#fff" /> Save changes</Btn>
          </div>
        </Card>,
        notifications: <Card>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 4 }}>Notifications</div>
          <div style={{ fontSize: 12, color: C.t3, marginBottom: 16 }}>Control when and how Wedigtech contacts you.</div>
          {[{ k: 'email', l: 'Email notifications', s: 'Agent completions, Playbook updates, weekly digest' }, { k: 'browser', l: 'Browser push', s: 'Real-time alerts when agents finish' }, { k: 'weekly', l: 'Wedigtech Weekly', s: 'AI tools drops, new Playbooks, founder tips — every Monday' }, { k: 'agentComplete', l: 'Agent completion alerts', s: 'Get notified the moment an agent finishes' }, { k: 'newPlaybook', l: 'New Playbook drops', s: 'Be first to know when a new Playbook is published' }].map(n => (
            <Row key={n.k} label={n.l} sub={n.s}><Toggle on={notifs[n.k]} toggle={() => setNotifs(p => ({ ...p, [n.k]: !p[n.k] }))} /></Row>
          ))}
        </Card>,
        billing: <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          <Card>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 14 }}>Current Plan</div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 14px', background: C.purpleL, borderRadius: 10, border: `1px solid ${C.purple}20` }}>
              <div><div style={{ fontSize: 14, fontWeight: 700, color: C.purple }}>{user.plan} Plan</div><div style={{ fontSize: 12, color: C.t3 }}>Free forever · 20 growth actions / month · Core Playbooks</div></div>
              <Btn size="sm" v="primary" onClick={() => toast('Opening upgrade flow…')}>Upgrade</Btn>
            </div>
          </Card>
          <Card>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 14 }}>Growth Actions</div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}><span style={{ fontSize: 13, color: C.t2 }}>14 of 20 growth actions used this month</span><Btn size="sm" v="outline" onClick={() => toast('Buy more…')}>Get more</Btn></div>
            <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: 'hidden' }}><div style={{ height: '100%', width: '70%', background: C.purple, borderRadius: 3 }} /></div>
            <div style={{ fontSize: 11, color: C.t4, marginTop: 5 }}>Renews in 18 days</div>
          </Card>
          <Card><div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 14 }}>Billing History</div><div style={{ textAlign: 'center', padding: '20px 0', fontSize: 13, color: C.t3 }}>No invoices yet. Upgrade to see billing history.</div></Card>
        </div>,
        privacy: <Card>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 4 }}>Privacy & Security</div>
          {[{ l: 'Change password', s: 'Last changed: Never', a: 'Change', v: 'outline' }, { l: 'Two-factor authentication', s: 'Add an extra layer of security', a: 'Enable', v: 'primary' }, { l: 'Active sessions', s: '1 active session — Chrome, Jaipur IN', a: 'Manage', v: 'outline' }, { l: 'Export your data', s: 'Download all Playbook data, activity, preferences', a: 'Export', v: 'outline' }, { l: 'Delete account', s: 'Permanently delete your account and all data', a: 'Delete', v: 'danger' }].map(item => (
            <Row key={item.l} label={item.l} sub={item.s}><Btn size="sm" v={item.v} onClick={() => toast(`${item.l}…`, null, item.v === 'danger' ? 'warning' : 'default')}>{item.a}</Btn></Row>
          ))}
        </Card>,
        integrations: <Card>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.text, marginBottom: 4 }}>Integrations</div>
          <div style={{ fontSize: 12, color: C.t3, marginBottom: 16 }}>Connect Wedigtech to your existing tools.</div>
          {[{ name: 'Slack', icon: 'megaphone', desc: 'Agent completion alerts in your Slack channel', col: '#4A154B' }, { name: 'Notion', icon: 'notePencil', desc: 'Sync Playbook outputs to Notion pages', col: '#000' }, { name: 'HubSpot', icon: 'target', desc: 'Export leads from Lead Gen Agent', col: '#FF7A59' }, { name: 'Zapier', icon: 'lightning', desc: 'Trigger automations from agent completions', col: '#FF4F00' }, { name: 'Google Sheets', icon: 'chartBar', desc: 'Export results as Google Sheets', col: '#34A853' }].map(int => (
            <div key={int.name} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 0', borderBottom: `1px solid ${C.border}` }}>
              <div style={{ width: 36, height: 36, borderRadius: 9, background: int.col + '15', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name={int.icon} size={17} color={int.col} /></div>
              <div style={{ flex: 1 }}><div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{int.name}</div><div style={{ fontSize: 11, color: C.t3 }}>{int.desc}</div></div>
              <Btn size="sm" v="outline" onClick={() => toast(`Connecting ${int.name}…`)}>Connect</Btn>
            </div>
          ))}
        </Card>,
      };
      return <div className="fu" style={{ display: 'flex', gap: 24, alignItems: 'flex-start' }}>
        <div style={{ width: 186, flexShrink: 0 }}>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: C.t4, marginBottom: 8, padding: '0 2px' }}>Settings</div>
          {SECS.map(s => {
            const [h, setH] = useState(false); const active = sec === s.id;
            return <button key={s.id} onClick={() => setSec(s.id)} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
              style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 9, padding: '8px 10px', borderRadius: 9, fontSize: 14, fontWeight: active ? 600 : 400, color: active ? C.purple : h ? C.text : C.t2, background: active ? C.purpleL : h ? C.bg : 'transparent', border: 'none', cursor: 'pointer', fontFamily: C.sans, textAlign: 'left', marginBottom: 2, transition: 'all .12s' }}>
              <Icon name={s.icon} size={15} color={active ? C.purple : 'currentColor'} />{s.label}
            </button>;
          })}
        </div>
        <div style={{ flex: 1, maxWidth: 540 }}>{content[sec] || null}</div>
      </div>;
    }

    /* ─── RESULTS PAGE ────────────────────────────── */
    function ResultsPage({ toast }) {
      const stats = [{ label: 'Total leads generated', val: '1,247', icon: 'target', col: C.green, change: '+23%' }, { label: 'Content pieces created', val: '47', icon: 'pencil', col: C.amber, change: '+8 this month' }, { label: 'Revenue influenced', val: '₹4.2L', icon: 'trendUp', col: C.blue, change: 'estimated' }, { label: 'Hours saved by AI', val: '47h', icon: 'sparkle', col: C.purple, change: 'this month' }];
      const runs = [{ id: 1, agent: 'Get 1,000 Qualified Leads', date: 'Apr 15', result: '847 leads', credits: 4, status: 'done' }, { id: 2, agent: 'Turn 1 Video Into 30 Pieces', date: 'Apr 14', result: '10 posts + newsletter', credits: 2, status: 'done' }, { id: 3, agent: 'Book 50 Discovery Calls', date: 'Apr 11', result: '240 sequences sent', credits: 3, status: 'done' }, { id: 4, agent: 'Full Competitor Intelligence', date: 'Apr 8', result: '12-page report', credits: 5, status: 'done' }, { id: 5, agent: 'Get 1,000 Qualified Leads', date: 'Apr 5', result: '400 leads', credits: 4, status: 'done' }];
      return <div className="fu">
        <div style={{ marginBottom: 20 }}>
          <h2 style={{ fontFamily: C.heading, fontSize: 24, fontWeight: 700, color: C.text }}>Results</h2>
          <p style={{ fontSize: 13, color: C.t3, marginTop: 3 }}>Track outcomes from every Agent run, Playbook phase, and toolkit applied.</p>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 10, marginBottom: 24 }}>
          {stats.map(s => (
            <div key={s.label} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 14, padding: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: C.t3, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{s.label}</div>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: s.col + '12', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name={s.icon} size={16} color={s.col} /></div>
              </div>
              <div style={{ fontFamily: C.mono, fontSize: 26, fontWeight: 700, color: C.text, lineHeight: 1, marginBottom: 6, animation: 'countUp .4s ease' }}>{s.val}</div>
              <span style={{ fontSize: 11, color: C.green, fontWeight: 600 }}>{s.change}</span>
            </div>
          ))}
        </div>
        <SHd title="Agent Run History" link="Export CSV" onLink={() => toast('Exporting…', null, 'success')} />
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 14, overflow: 'hidden' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr 1.5fr 1fr 80px', padding: '10px 16px', borderBottom: `1px solid ${C.border}`, background: C.bg }}>
            {['Agent', 'Date', 'Result', 'Cost', 'Status'].map(h => <span key={h} style={{ fontSize: 11, fontWeight: 600, color: C.t3, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{h}</span>)}
          </div>
          {runs.map((r, i) => (
            <div key={r.id} onClick={() => toast(`Viewing ${r.agent}…`)} style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr 1.5fr 1fr 80px', padding: '12px 16px', borderBottom: i < runs.length - 1 ? `1px solid ${C.border}` : 'none', cursor: 'pointer', transition: 'background .12s' }} onMouseEnter={e => e.currentTarget.style.background = C.bg} onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.text, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.agent}</div>
              <div style={{ fontSize: 12, color: C.t3 }}>{r.date}</div>
              <div style={{ fontSize: 12, color: C.text, fontWeight: 500 }}>{r.result}</div>
              <div style={{ fontFamily: C.mono, fontSize: 12, color: C.t2 }}>{r.credits} cr</div>
              <span style={{ fontSize: 11, fontWeight: 600, color: C.green, background: C.greenBg, padding: '2px 8px', borderRadius: 20, width: 'fit-content' }}>Done</span>
            </div>
          ))}
        </div>
      </div>;
    }

    function WorkspacePage({ toast }) {
      const items = [{ id: 1, type: 'output', icon: 'target', title: 'B2B SaaS Lead List — India', desc: '847 leads · CSV · 94% verified', date: '2h ago', tag: 'GROW', col: C.green }, { id: 2, type: 'output', icon: 'pencil', title: 'Wedigtech Intro — 10 Social Posts', desc: 'Instagram, LinkedIn, Twitter threads', date: 'Yesterday', tag: 'GROW', col: C.amber }, { id: 3, type: 'playbook', icon: 'bookOpen', title: 'MVP Builder — Phase 1 Notes', desc: '6 pages · Validation framework', date: '3d ago', tag: 'BUILD', col: C.purple }, { id: 4, type: 'output', icon: 'magnifying', title: 'Competitor Research Report', desc: '12 pages · 8 competitors', date: '5d ago', tag: 'RESEARCH', col: C.blue }, { id: 5, type: 'toolkit', icon: 'toolbox', title: 'MVP Builder Toolkit', desc: '7 assets · Downloaded', date: '1w ago', tag: 'BUILD', col: C.purple }];
      return <div className="fu">
        <div style={{ marginBottom: 20 }}><h2 style={{ fontFamily: C.heading, fontSize: 24, fontWeight: 700, color: C.text }}>My Work</h2><p style={{ fontSize: 13, color: C.t3, marginTop: 3 }}>All your Playbook outputs, Agent results, and saved assets.</p></div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {items.map((item, i) => (
            <div key={item.id} onClick={() => toast(`Opening ${item.title}…`)} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: '13px 15px', cursor: 'pointer', transition: 'all .15s', display: 'flex', alignItems: 'center', gap: 12 }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = item.col + '55'; e.currentTarget.style.transform = 'translateX(3px)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.transform = 'none'; }}>
              <div style={{ width: 36, height: 36, borderRadius: 9, background: item.col + '14', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name={item.icon} size={17} color={item.col} /></div>
              <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 2 }}>{item.title}</div><div style={{ fontSize: 12, color: C.t3 }}>{item.desc}</div></div>
              <div style={{ textAlign: 'right', flexShrink: 0 }}><div style={{ marginBottom: 4 }}><Tag label={item.tag} col={item.col} /></div><div style={{ fontSize: 11, color: C.t4 }}>{item.date}</div></div>
              <div style={{ display: 'flex', gap: 6, marginLeft: 6 }}>
                <Btn size="xs" v="ghost" onClick={e => { e.stopPropagation(); toast('Downloading…', null, 'success'); }}><Icon name="download" size={12} /></Btn>
                <Btn size="xs" v="ghost" onClick={e => { e.stopPropagation(); toast('Copied!', null, 'success'); }}><Icon name="copy" size={12} /></Btn>
              </div>
            </div>
          ))}
        </div>
      </div>;
    }

    /* ─── APP ─────────────────────────────────────── */
    function App() {
      const [tab, setTab] = useState('home');
      const [testMode, setTestMode] = useState('returning');
      const [showCmd, setShowCmd] = useState(false);
      const [sbWidth, setSbWidth] = useState(240);
      const [sbMin, setSbMin] = useState(false);
      const [obShown, setObShown] = useLS('wedigtech_ob_v5_shown', false);
      const [obAnswers, setObAnswers] = useLS('wedigtech_ob_v5_answers', null);
      const [user, setUser] = useLS('wedigtech_user_v5', {
        firstName: 'Pranay', lastName: 'M.', name: 'Pranay M.',
        email: 'pranay@wedigtech.com', company: 'Wedigtech',
        role: 'Non-technical founder', industry: 'SaaS / Software',
        plan: 'Founder', stage: 'Early revenue ($0–10k/mo)', goal: 'Hit $10k MRR',
      });
      const [notifs, setNotifs] = useState(NOTIFS);
      const { toasts, show: toast, dismiss } = useToast();
      const [deepLink, setDeepLink] = useState(null);
      const credits = { used: 14, total: 20, days: 18 };
      const h = new Date().getHours();
      const gw = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
      const markRead = useCallback(() => { setNotifs(p => p.map(n => ({ ...n, read: true }))); toast('All marked as read', null, 'success'); }, []);
      const handleObComplete = useCallback(answers => {
        setObAnswers(answers); setObShown(true);
        setUser(u => ({ ...u, stage: answers.stage, goal: answers.goal }));
        toast('Dashboard personalised!', null, 'success');
      }, []);

      if (testMode === 'new' && !obShown) {
        return <>
          <OnboardingFlow onComplete={handleObComplete} />
          <TestBanner mode={testMode} onChange={m => { setTestMode(m); if (m === 'returning') setObShown(true); }} />
        </>;
      }

      const pages = {
        home: <HomePage user={user} toast={toast} testMode={testMode} onTab={setTab} obAnswers={obAnswers} onDeepLink={setDeepLink} />,
        playbooks: <PlaybooksPage toast={toast} deepLink={deepLink} onClearDeepLink={() => setDeepLink(null)} />,
        toolkits: <ToolkitsPage toast={toast} />,
        agents: <AgentsPage toast={toast} onTab={setTab} />,
        workspace: <WorkspacePage toast={toast} />,
        results: <ResultsPage toast={toast} />,
        team: <TeamPage user={user} toast={toast} />,
        profile: <ProfilePage user={user} onUpdate={setUser} toast={toast} />,
        settings: <SettingsPage user={user} toast={toast} />,
        strategist: <StrategistPage user={user} toast={toast} />,
        workflow: <WorkflowPage toast={toast} />,
        vault: <VaultPage toast={toast} />,
      };

      return <>
        <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: C.bg }}>
          <Sidebar tab={tab} onTab={setTab} user={user} credits={credits} onCmd={() => setShowCmd(true)}
            width={sbWidth} onWidthChange={setSbWidth} minimized={sbMin} onToggleMinimize={() => setSbMin(!sbMin)} />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, minHeight: 0 }}>
            <Topbar greeting={`${gw}, ${user.firstName}.`} onTab={setTab} notifs={notifs} onMarkRead={markRead} />
            <main style={{ flex: 1, minHeight: 0, overflowY: 'auto', overflowX: 'hidden' }}>
              <div style={{ padding: '28px 32px 56px', maxWidth: 1020, margin: '0 auto' }}>
                {pages[tab] || pages.home}
              </div>
            </main>
          </div>
        </div>
        {showCmd && <CmdPalette onClose={() => setShowCmd(false)} onTab={t => { setTab(t); setShowCmd(false); }} toast={toast} />}
        <TestBanner mode={testMode} onChange={m => { setTestMode(m); if (m === 'new') setObShown(false); else setObShown(true); }} />
        <HelpButton />
        <ToastStack toasts={toasts} dismiss={dismiss} />
      </>;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
